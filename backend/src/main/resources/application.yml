# DMS 后端默认配置（profile: docker）
server:
  port: 8080
spring:
  application:
    name: dms-backend
  profiles:
    default: docker
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dms}?stringtype=unspecified
    username: ${DB_USER:dms}
    password: ${DB_PASSWORD:dms123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      hibernate.jdbc.time_zone: Asia/Shanghai
      hibernate.format_sql: true
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

dms:
  jwt:
    secret: ${JWT_SECRET:dms-super-secret-key-please-change-in-prod-1234567890abcdef}
    access-token-ttl: 3600000
    refresh-token-ttl: 604800000
  wechat:
    app-id: ${WECHAT_APP_ID:mock_appid}
    app-secret: ${WECHAT_APP_SECRET:mock_secret}
    mock-enabled: true
  seed:
    enabled: ${SEED_ENABLED:true}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:dms}

logging:
  level:
    root: INFO
    com.dms: DEBUG
    org.hibernate.SQL: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

version: '3.8'

# ============================================
# DMS 阿里云生产环境部署（占位配置示例）
# 生产用请将下面的占位符替换为真实值
# ============================================

services:
  postgres:
    image: postgres:14-alpine
    container_name: dms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dms
      POSTGRES_USER: dms
      POSTGRES_PASSWORD: <REPLACE_ME_STRONG_PASSWORD>  # 生产必须改
      TZ: Asia/Shanghai
    volumes:
      - dms_pgdata:/var/lib/postgresql/data
    networks:
      - dms-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dms"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dms-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - dms_redisdata:/data
    networks:
      - dms-net

  backend:
    image: dms-backend:latest
    container_name: dms-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: dms-postgres
      DB_PORT: 5432
      DB_NAME: dms
      DB_USER: dms
      DB_PASSWORD: <REPLACE_ME_STRONG_PASSWORD>       # 与上面一致
      SPRING_DATA_REDIS_HOST: dms-redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: <REPLACE_ME_LONG_RANDOM_JWT_SECRET_AT_LEAST_64_CHARS>
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC"
    ports:
      - "8080:8080"
    mem_limit: 768m
    networks:
      - dms-net

  nginx:
    image: nginx:1.25-alpine
    container_name: dms-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - dms-net

networks:
  dms-net:
    driver: bridge

volumes:
  dms_pgdata:
  dms_redisdata:

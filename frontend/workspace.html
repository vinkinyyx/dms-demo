function renderMenu(activeKey){
  var h = '';
  MENU_GROUPS.forEach(function(g){
    h += '<div class="dms-nav-group">' + g.group + '</div>';
    g.items.forEach(function(m){
      h += '<div class="dms-nav-item ' + (m.key===activeKey?'active':'') + '" onclick="goto(\'' + m.key + '\')">' +
           '<span class="icon">' + m.icon + '</span><span>' + m.label + '</span></div>';
    });

function goto(key){
  var m = MENU_INDEX[key]; if (!m) return;
  renderMenu(key);

  if (m.render) m.render();

// ============ 通用列表 ============
var currentList = {};

function renderList(menu){
  currentList = { menu: menu, page: 1, size: 20 };
  var newBtn = menu.readonly ? '' : '<button class="dms-btn dms-btn-primary" onclick="doCreate()">➕ 新建</button>';
  document.getElementById('content').innerHTML =
    '<div class="dms-page-title">' + menu.label + '</div>' +
    '<div class="dms-page-sub">共 <span id="totalCnt">-</span> 条数据 · <code>' + menu.api + '</code></div>' +
    '<div class="dms-card">' +
      '<div class="dms-card-title">' +
        '<span>数据列表</span>' +
        '<div class="actions">' +
          '<button class="dms-btn" onclick="reloadList()">🔄 刷新</button>' + newBtn +
        '</div>' +
      '</div>' +
      '<div id="listArea"><div class="dms-loading">加载中...</div></div>' +
    '</div>';
  reloadList();
}

function reloadList(){
  var m = currentList.menu;
  var q = '?page=' + currentList.page + '&size=' + currentList.size;
  DMS.api(m.api + q).then(function(d){
    if (d.code !== 0) {
      document.getElementById('listArea').innerHTML = '<div class="dms-error-hint">加载失败：' + d.message + '</div>';
      return;
    }
    var list = (d.data && d.data.list) || (d.data && d.data.data) || (Array.isArray(d.data) ? d.data : []);
    var total = (d.data && d.data.total != null) ? d.data.total : list.length;
    var totalEl = document.getElementById('totalCnt');
    if (totalEl) totalEl.textContent = total;

    if (!list.length) { document.getElementById('listArea').innerHTML = '<div class="dms-empty">📭 暂无数据</div>'; return; }

    var h = '<table><thead><tr>';
    m.cols.forEach(function(c){
      var w = c.w ? (' style="width:' + c.w + 'px;"') : '';
      h += '<th' + w + '>' + c.l + '</th>';
    });
    if (!m.readonly) h += '<th style="width:240px;">操作</th>';
    h += '</tr></thead><tbody>';

    list.forEach(function(row){
      h += '<tr>';
      m.cols.forEach(function(c){
        var v = row[c.k];
        if (c.k === 'status') h += '<td>' + DMS.statusBadge(v) + '</td>';
        else if (typeof v === 'number' && (c.k.indexOf('mount')>0 || c.k.indexOf('rice')>0)) h += '<td>¥ ' + Number(v).toFixed(2) + '</td>';
        else if (typeof v === 'boolean') h += '<td>' + (v ? '✅' : '—') + '</td>';
        else h += '<td>' + DMS.fmt(v, c.k) + '</td>';
      });
      if (!m.readonly) {
        var id = row.id;
        h += '<td>' +
          '<button class="dms-btn dms-btn-sm" onclick="doView(' + id + ')">👁️ 查看</button>';
        // 状态驱动按钮
        if (m.statusDriven) {
          var acts = actionsForStatus(m, row.status);
          acts.forEach(function(a){
            var cls = 'dms-btn-' + (a.type || 'warn');
            var lbl = a.label;
            var confirmMsg = a.confirm || ('确认' + lbl + '？');
            h += ' <button class="dms-btn dms-btn-sm ' + cls + '" onclick="doStatusAction(' + id + ',\'' + a.key + '\',\'' + a.method + '\',\'' + a.path + '\',\'' + confirmMsg + '\')">' + lbl + '</button>';
          });
        } else {
          // 无状态驱动：显示编辑
          h += ' <button class="dms-btn dms-btn-sm dms-btn-primary" onclick="doEdit(' + id + ')">✏️ 编辑</button>';
          if (m.actions) {
            m.actions.forEach(function(a, idx){
              var cls = 'dms-btn-' + (a.type || 'warn');
              h += ' <button class="dms-btn dms-btn-sm ' + cls + '" onclick="doAction(' + id + ',' + idx + ')">' + a.label + '</button>';
            });
          }
        }
        h += '</td>';
      }
      h += '</tr>';
    });
    h += '</tbody></table>';
    h += '<div class="dms-pagination">共 ' + total + ' 条 · 第 ' + currentList.page + ' 页 · ' +
         '<button ' + (currentList.page<=1?'disabled':'') + ' onclick="currentList.page--;reloadList()">上一页</button>' +
         '<button ' + (list.length<currentList.size?'disabled':'') + ' onclick="currentList.page++;reloadList()">下一页</button></div>';
    document.getElementById('listArea').innerHTML = h;
  }).catch(function(e){
    document.getElementById('listArea').innerHTML = '<div class="dms-error-hint">网络错误：' + e.message + '</div>';
  });
}

function doCreate(){
  var m = currentList.menu;
  // 销售订单/采购订单使用大屏下单页
  if (m.key === 'orders') {
    window.location.href = '/order-create.html?mode=sales';
    return;
  }
  if (m.key === 'purchase-orders') {
    window.location.href = '/order-create.html?mode=purchase';
    return;
  }
  DMS.form({
    title: '新建 · ' + m.label,
    okText: '保存',
    fields: m.form,
    onSubmit: function(data){
      return DMS.api(m.api, { method:'POST', body: data }).then(function(d){
        if (d.code === 0) { DMS.toast('新建成功', 'success'); reloadList(); return true; }
        DMS.toast('新建失败：' + d.message, 'error'); return false;
      });
    }
  });
}

function doView(id){
  var m = currentList.menu;
  DMS.api(m.api + '/' + id).then(function(d){
    if (d.code !== 0) { DMS.toast('查看失败：' + d.message, 'error'); return; }
    renderDetailChinese(m, d.data);
  });
}

// ============ 中文详情视图 ============
function renderDetailChinese(menu, data){
  // 构建中文字段视图（不显示 JSON）
  var groups = {
    '基本信息': [],
    '金额': [],
    '时间': [],
    '状态': [],
    '其它': []
  };

  // 通用字段映射
  var fieldGroups = {
    'id':'基本信息','code':'基本信息','orderType':'基本信息','name':'基本信息','nameCn':'基本信息',
    'dealerId':'基本信息','supplierId':'基本信息','warehouseId':'基本信息','productId':'基本信息',
    'terminalId':'基本信息','hospitalId':'基本信息','categoryId':'基本信息','regionId':'基本信息',
    'amountInclTax':'金额','discountAmount':'金额','finalAmount':'金额','taxAmount':'金额',
    'currentPrice':'金额','price':'金额','taxRate':'金额','qty':'金额',
    'createdAt':'时间','updatedAt':'时间','expectedDate':'时间','submittedAt':'时间',
    'approvedAt':'时间','completedAt':'时间','arrivedAt':'时间','salesDate':'时间',
    'validFrom':'时间','validTo':'时间','issueDate':'时间',
    'status':'状态','gspStatus':'状态'
  };

  Object.keys(data || {}).forEach(function(k){
    if (k === 'lines' || k === 'extra' || k === 'allowedActions') return;
    var g = fieldGroups[k] || '其它';
    groups[g].push({ key: k, value: data[k] });
  });

  var h = '';

  // 顶部：单号+状态+关键操作
  h += '<div style="padding:16px 20px;background:linear-gradient(135deg,#2C4B8E,#1E3A5F);color:#fff;border-radius:6px;margin-bottom:16px;">' +
       '<div style="font-size:12px;opacity:.8;">' + menu.label + '</div>' +
       '<div style="font-size:20px;font-weight:700;margin:4px 0;">' + (data.code || ('#' + data.id)) + '</div>' +
       '<div style="display:flex;gap:12px;align-items:center;font-size:12px;opacity:.9;">' +
       (data.status ? '<span style="background:rgba(255,255,255,.2);padding:3px 10px;border-radius:10px;">' + statusChinese(data.status) + '</span>' : '') +
       (data.createdAt ? '<span>创建时间：' + String(data.createdAt).substring(0,19) + '</span>' : '') +
       '</div></div>';

  // 分组字段
  ['基本信息','金额','时间','状态','其它'].forEach(function(gname){
    var items = groups[gname];
    if (!items.length) return;
    h += '<div style="margin-bottom:14px;">' +
         '<div style="font-size:13px;font-weight:600;color:#2C4B8E;padding:6px 12px;background:#e6f4ff;border-left:3px solid #2C4B8E;margin-bottom:8px;">' + gname + '</div>' +
         '<table style="width:100%;border-collapse:collapse;">';
    items.forEach(function(it){
      var label = DMS.labelOf(it.key);
      var val = it.value;
      var display;
      if (val == null || val === '') display = '<span style="color:#bbb;">-</span>';
      else if (it.key === 'status') display = DMS.statusBadge(val);
      else if (typeof val === 'boolean') display = val ? '✅ 是' : '否';
      else if (typeof val === 'number' && (it.key.indexOf('mount')>0 || it.key.indexOf('Price')>0)) display = '<span style="color:#f5222d;font-weight:600;">¥ ' + Number(val).toFixed(2) + '</span>';
      else if (typeof val === 'object') display = '<code style="font-size:11px;">' + JSON.stringify(val) + '</code>';
      else display = String(val).replace(/T/,' ').substring(0,50);
      h += '<tr style="border-bottom:1px solid #f5f5f5;">' +
           '<td style="padding:8px 12px;width:140px;color:#999;font-size:12px;">' + label + '</td>' +
           '<td style="padding:8px 12px;font-size:13px;">' + display + '</td></tr>';
    });
    h += '</table></div>';
  });

  // 明细子表（如果有）
  if (data.lines && data.lines.length) {
    h += '<div style="margin-bottom:14px;">' +
         '<div style="font-size:13px;font-weight:600;color:#2C4B8E;padding:6px 12px;background:#e6f4ff;border-left:3px solid #2C4B8E;margin-bottom:8px;">📋 明细（' + data.lines.length + ' 项）</div>' +
         '<table style="width:100%;border-collapse:collapse;font-size:12px;">' +
         '<thead><tr style="background:#fafbfc;">' +
         '<th style="padding:8px;text-align:left;">#</th>' +
         '<th style="padding:8px;text-align:left;">产品</th>' +
         '<th style="padding:8px;text-align:left;">数量</th>' +
         '<th style="padding:8px;text-align:left;">单价</th>' +
         '<th style="padding:8px;text-align:left;">税率</th>' +
         '<th style="padding:8px;text-align:left;">小计</th></tr></thead><tbody>';
    data.lines.forEach(function(l, i){
      h += '<tr style="border-bottom:1px solid #f5f5f5;">' +
           '<td style="padding:8px;">' + (i+1) + '</td>' +
           '<td style="padding:8px;"><div style="font-weight:600;color:#2C4B8E;">' + (l.productCode || l.code || ('#' + l.productId)) + '</div>' +
             '<div style="color:#666;font-size:11px;">' + (l.productName || '-') + (l.productSpec ? ' · ' + l.productSpec : '') + '</div></td>' +
           '<td style="padding:8px;">' + (l.qty || 0) + (l.receivedQty != null ? '<div style="color:#52c41a;font-size:10px;">已收 ' + l.receivedQty + '</div>' : '') + '</td>' +
           '<td style="padding:8px;">¥ ' + Number(l.unitPrice||0).toFixed(2) + '</td>' +
           '<td style="padding:8px;">' + (Number(l.taxRate||0)*100).toFixed(0) + '%</td>' +
           '<td style="padding:8px;font-weight:600;color:#f5222d;">¥ ' + Number(l.subtotal || (Number(l.qty||0)*Number(l.unitPrice||0))).toFixed(2) + '</td>' +
           '</tr>';
    });
    h += '</tbody></table></div>';
  }

  // 允许操作
  var actionButtons = '';
  if (data.allowedActions && data.allowedActions.length) {
    actionButtons = data.allowedActions.map(function(a){
      return '<button class="dms-btn dms-btn-' + (a.type||'primary') + '" ' +
             'onclick="doStatusAction(' + data.id + ',\'' + a.key + '\',\'' + a.method + '\',\'' + a.path + '\',\'确认' + a.label + '？\')">' +
             a.label + '</button>';
    }).join(' ');
  }

  // 弹窗
  var mask = document.createElement('div');
  mask.className = 'dms-modal-mask';
  var box = document.createElement('div');
  box.className = 'dms-modal-box';
  box.style.maxWidth = '820px';
  box.innerHTML =
    '<div class="dms-modal-hdr"><span>' + menu.label + ' · 详情</span><button class="dms-modal-close">&times;</button></div>' +
    '<div class="dms-modal-body">' + h + '</div>' +
    '<div class="dms-modal-ftr">' + actionButtons +
    ' <button class="dms-btn dms-btn-cancel">关闭</button></div>';
  mask.appendChild(box);
  document.body.appendChild(mask);
  setTimeout(function(){ mask.classList.add('show'); }, 10);
  var close = function(){ mask.classList.remove('show'); setTimeout(function(){ mask.remove(); }, 200); };
  box.querySelector('.dms-modal-close').onclick = close;
  box.querySelector('.dms-btn-cancel').onclick = close;
  mask.onclick = function(e){ if(e.target===mask) close(); };
}

function statusChinese(s){
  var map = {
    'DRAFT':'草稿','SUBMITTED':'已提交','APPROVED':'已审批','REJECTED':'已驳回',
    'CANCELLED':'已取消','COMPLETED':'已完成','RECEIVING':'收货中','SHIPPED':'已发货',
    'active':'启用','inactive':'停用','locked':'锁定'
  };
  return map[s] || map[String(s).toUpperCase()] || s;
}

// ============ 状态驱动按钮 - 根据订单状态获取允许的操作 ============
function actionsForStatus(menu, status){
  // 采购订单状态机
  if (menu.purchaseOrder) {
    switch (String(status||'').toUpperCase()) {
      case 'DRAFT':
        return [
          {key:'edit',    label:'编辑',     type:'primary', method:'GET',  path:''},
          {key:'submit',  label:'提交审批', type:'warn',    method:'POST', path:'/submit', confirm:'确认提交采购单？'},
          {key:'cancel',  label:'取消',     type:'danger',  method:'POST', path:'/cancel', confirm:'确认取消？'}
        ];
      case 'SUBMITTED':
        return [
          {key:'approve', label:'审批通过', type:'success', method:'POST', path:'/approve', confirm:'审批通过？'},
          {key:'reject',  label:'驳回',     type:'danger',  method:'POST', path:'/reject',  confirm:'确认驳回？'},
          {key:'cancel',  label:'取消',     type:'default', method:'POST', path:'/cancel'}
        ];
      case 'APPROVED':
        return [
          {key:'receive', label:'📦 收货入库', type:'success', method:'POST', path:'/receive', confirm:'确认整单收货入库？将自动更新库存。'}
        ];
      case 'RECEIVING':
        return [
          {key:'receive', label:'📦 继续收货', type:'success', method:'POST', path:'/receive', confirm:'继续收货？'}
        ];
      default:
        return [];
    }
  }
  // 销售订单状态机
  if (menu.salesOrder) {
    switch (String(status||'').toUpperCase()) {
      case 'DRAFT':
        return [
          {key:'edit',    label:'编辑',     type:'primary', method:'GET',  path:''},
          {key:'submit',  label:'提交审批', type:'warn',    method:'POST', path:'/submit', confirm:'确认提交订单？'},
          {key:'cancel',  label:'取消',     type:'danger',  method:'POST', path:'/cancel', confirm:'确认取消订单？'}
        ];
      case 'SUBMITTED':
        return [
          {key:'approve', label:'审批通过', type:'success', method:'POST', path:'/approve', confirm:'审批通过？'},
          {key:'reject',  label:'驳回',     type:'danger',  method:'POST', path:'/reject',  confirm:'确认驳回订单？'},
          {key:'cancel',  label:'取消',     type:'default', method:'POST', path:'/cancel'}
        ];
      default:
        return [];
    }
  }
  return [];
}

// 状态动作执行
function doStatusAction(id, key, method, path, confirmMsg){
  var m = currentList.menu;
  if (key === 'edit') { doEdit(id); return; }
  DMS.confirm(confirmMsg || '确认执行？', function(){
    DMS.api(m.api + '/' + id + path, {method: method || 'POST'}).then(function(d){
      if (d.code === 0) { DMS.toast('操作成功', 'success'); reloadList(); }
      else DMS.toast('失败：' + d.message, 'error');
    });
  });
}

function doEdit(id){
  var m = currentList.menu;
  DMS.api(m.api + '/' + id).then(function(d){
    if (d.code !== 0) { DMS.toast('加载失败：' + d.message, 'error'); return; }
    var fields = m.form.map(function(f){
      var newF = Object.assign({}, f);
      newF.value = d.data[f.key];
      // Picker 类字段：如果关联对象也已 join，用其 label
      if (f.picker && newF.value != null) {
        newF.displayValue = '#' + newF.value;
      }
      return newF;
    });
    DMS.form({
      title: '编辑 · ' + m.label + ' #' + id,
      okText: '更新',
      fields: fields,
      onSubmit: function(data){
        return DMS.api(m.api + '/' + id, { method:'PUT', body: data }).then(function(d2){
          if (d2.code === 0) { DMS.toast('更新成功', 'success'); reloadList(); return true; }
          DMS.toast('更新失败：' + d2.message, 'error'); return false;
        });
      }
    });
  });
}

function doAction(id, actionIdx){
  var m = currentList.menu;
  var a = m.actions[actionIdx];
  DMS.confirm(a.confirm || ('确认' + a.label + '？'), function(){
    DMS.api(m.api + '/' + id + a.path, { method: a.method, body: a.body || null }).then(function(d){
      if (d.code === 0) { DMS.toast(a.label + ' 成功', 'success'); reloadList(); }
      else DMS.toast(a.label + ' 失败：' + d.message, 'error');
    });
  });
}

      '<div id="recentOrders"><div class="dms-loading">加载中...</div></div>' +
    '</div>' +
    '<div class="dms-card">' +
      '<div class="dms-card-title"><span>🏢 经销商概览</span>' +
      '<div class="actions"><button class="dms-btn dms-btn-primary" onclick="goto(\'dealers\')">全部 →</button></div></div>' +
      '<div id="recentDealers"><div class="dms-loading">加载中...</div></div>' +
    '</div>';

  DMS.api('/api/system/stats').then(function(d){
    if (d.code===0) {
      document.getElementById('k1').textContent = d.data.orders || 0;
      document.getElementById('k2').textContent = d.data.dealers || 0;
      document.getElementById('k3').textContent = d.data.products || 0;
      document.getElementById('k4').textContent = d.data.inventoryRecords || 0;
      document.getElementById('k5').textContent = d.data.contracts || 0;
      document.getElementById('k6').textContent = d.data.promotions || 0;
    }
  });

  // 库存告警 3 张卡（US-B-17）
  DMS.api('/api/dashboard/inventory-stats').then(function(d){
    if (d.code===0) {
      var inv = d.data || {};
      document.getElementById('invAlerts').innerHTML =
        '<div class="dms-kpi"><div class="dms-kpi-label">📦 库存总量</div><div class="dms-kpi-val">' + (inv.totalQty||0) + '</div></div>' +
        '<div class="dms-kpi"><div class="dms-kpi-label">⏰ 临期库存(30天)</div><div class="dms-kpi-val o">' + (inv.expiringQty||0) + '</div></div>' +
        '<div class="dms-kpi"><div class="dms-kpi-label">🐌 呆滞库存(90天)</div><div class="dms-kpi-val r">' + (inv.staleQty||0) + '</div></div>';
    }
  });

  // 待办列表（US-HOME-04）
  DMS.api('/api/dashboard/todos').then(function(d){
    if (d.code===0) {
      var items = (d.data && d.data.items) || [];
      if (!items.length) { document.getElementById('todos').innerHTML='<div class="dms-empty">🎉 暂无待办</div>'; return; }
      var h = '<table><thead><tr><th>类型</th><th>标题</th><th>关联</th><th>状态</th><th>操作</th></tr></thead><tbody>';
      items.forEach(function(t){
        h += '<tr>' +
          '<td>' + t.type + '</td>' +
          '<td>' + t.title + (t.count?' × ' + t.count :'') + '</td>' +
          '<td>' + (t.code||'-') + '</td>' +
          '<td>' + (t.status?DMS.statusBadge(t.status):'-') + '</td>' +
          '<td><button class="dms-btn dms-btn-sm dms-btn-primary" onclick="location.href=\''+t.link+'\'">处理</button></td>' +
          '</tr>';
      });
      h += '</tbody></table>';
      document.getElementById('todos').innerHTML = h;
    }
  });

  DMS.api('/api/orders?page=1&size=5').then(function(d){
    if (d.code===0) {
      var list = (d.data && d.data.list) || [];
      var h = '<table><thead><tr><th>订单号</th><th>类型</th><th>含税金额</th><th>状态</th></tr></thead><tbody>';
      list.forEach(function(o){
        h += '<tr><td>' + o.code + '</td><td>' + (o.orderType||'-') + '</td><td>¥ ' + Number(o.amountInclTax||0).toFixed(2) + '</td><td>' + DMS.statusBadge(o.status) + '</td></tr>';
      });
      h += '</tbody></table>';
      document.getElementById('recentOrders').innerHTML = h || '<div class="dms-empty">暂无</div>';
    }
  });

  DMS.api('/api/dealers?page=1&size=5').then(function(d){
    if (d.code===0) {
      var list = (d.data && d.data.list) || [];
      var h = '<table><thead><tr><th>编码</th><th>名称</th><th>级别</th><th>联系人</th><th>状态</th></tr></thead><tbody>';
      list.forEach(function(o){
        h += '<tr><td>' + o.code + '</td><td>' + o.name + '</td><td>' + (o.level==='T1'?'一级':(o.level==='T2'?'二级':o.level||'-')) + '</td><td>' + (o.contactName||'-') + '</td><td>' + DMS.statusBadge(o.status) + '</td></tr>';
      });
      h += '</tbody></table>';
      document.getElementById('recentDealers').innerHTML = h;
    }
  });
}

goto('home');
</script>
</body>
</html>

var MENU_INDEX = {};
MENU_GROUPS.forEach(function(g){ g.items.forEach(function(m){ m._group = g.group; MENU_INDEX[m.key] = m; }); });

// v3.4.15: 菜单分组覆盖配置（后台可调整），启动时从后端加载
var _menuOverrides = {};
function loadMenuOverrides(cb){
  DMS.api('/api/menu-configs').then(function(r){
    _menuOverrides = {};
    if (r && r.code === 0 && Array.isArray(r.data)) {
      r.data.forEach(function(c){ _menuOverrides[c.menuKey] = c; });
    }
    if (cb) cb();
  }).catch(function(){ if (cb) cb(); });
}

function renderMenu(activeKey){
  // v3.4.10 合并同名分组；v3.4.15 应用后台分组/排序/显隐覆盖
  var merged = {}; var order = [];
  MENU_GROUPS.forEach(function(g){
    g.items.forEach(function(m){
      var ov = _menuOverrides[m.key] || {};
      if (ov.visible === false) return;
      var gname = ov.group || m._group || g.group;
      if (!merged[gname]) { merged[gname] = []; order.push(gname); }
      merged[gname].push({ m: m, sort: (ov.sortOrder != null ? ov.sortOrder : 100) });
    });
  });
  var h = '';
  order.forEach(function(gname){
    h += '<div class="dms-nav-group">' + gname + '</div>';
    merged[gname].sort(function(a,b){ return a.sort - b.sort; });
    merged[gname].forEach(function(it){
      var m = it.m;
      h += '<div class="dms-nav-item ' + (m.key===activeKey?'active':'') + '" onclick="goto(\'' + m.key + '\');_mobileAfterNav();">' +
           '<span class="icon">' + m.icon + '</span><span>' + m.label + '</span></div>';
    });
  });
  document.getElementById('navMenu').innerHTML = h;
}

// ============ 移动端汉堡菜单 v3.4.7 ============
function toggleSidebar(forceState){
  var sb = document.getElementById('dmsSidebar');
  var mask = document.getElementById('mobileMask');
  var willOpen = (forceState === true) || (forceState === undefined && !sb.classList.contains('open'));
  if (forceState === false) willOpen = false;
  if (willOpen) { sb.classList.add('open'); mask.classList.add('show'); }
  else { sb.classList.remove('open'); mask.classList.remove('show'); }
}
function _mobileAfterNav(){
  if (window.innerWidth <= 900) toggleSidebar(false);
}

// ============ 多标签 Tabs 系统 v3.4.6 ============
// 每个 Tab 保存自身状态：菜单 key、附加过滤参数、当前分页信息、DOM 快照
var _tabs = [];      // [{id, key, label, icon, filter, state, pinned}]
var _activeTabId = null;
var _tabIdSeq = 0;
var _contentSnapshots = {}; // tabId -> {html, scrollTop}

function _saveActiveTabSnapshot(){
  if (!_activeTabId) return;
  var content = document.getElementById('content');
  // v3.4.15: 持久化用户已输入的表单值到 DOM 属性，使 innerHTML 快照能保留未保存内容
  content.querySelectorAll('input, textarea, select').forEach(function(el){
    if (el.type === 'checkbox' || el.type === 'radio') {
      if (el.checked) el.setAttribute('checked', 'checked'); else el.removeAttribute('checked');
    } else if (el.tagName === 'SELECT') {
      Array.prototype.forEach.call(el.options, function(o){
        if (o.selected) o.setAttribute('selected', 'selected'); else o.removeAttribute('selected');
      });
    } else if (el.tagName === 'TEXTAREA') {
      el.textContent = el.value == null ? '' : el.value;
    } else {
      el.setAttribute('value', el.value == null ? '' : el.value);
    }
  });
  _contentSnapshots[_activeTabId] = {
    html: content.innerHTML,
    scrollTop: content.scrollTop,
    currentList: JSON.parse(JSON.stringify(currentList || {}))
  };
}

function _renderTabsBar(){
  var bar = document.getElementById('tabsBar');
  bar.innerHTML = _tabs.map(function(t){
    var active = t.id === _activeTabId ? 'active' : '';
    var pinned = t.pinned ? 'pinned' : '';
    return '<button type="button" class="dms-tab ' + active + ' ' + pinned + '" data-tab-id="' + t.id + '">' +
      '<span class="dms-tab-icon">' + (t.icon||'📄') + '</span>' +
      '<span>' + t.label + '</span>' +
      (t.pinned ? '' : '<span class="close" onclick="closeTab(' + t.id + ',event)">×</span>') +
      '</button>';
  }).join('');
  bar.querySelectorAll('.dms-tab').forEach(function(el){
    el.addEventListener('click', function(e){
      if (e.target.classList.contains('close')) return;
      var id = Number(el.getAttribute('data-tab-id'));
      activateTab(id);
    });
  });
}

function closeTab(id, evt){
  if (evt) evt.stopPropagation();
  var idx = _tabs.findIndex(function(t){return t.id === id;});
  if (idx < 0) return;
  if (_tabs[idx].pinned) return;
  _tabs.splice(idx, 1);
  delete _contentSnapshots[id];
  if (_activeTabId === id) {
    var next = _tabs[Math.min(idx, _tabs.length - 1)] || _tabs[0];
    if (next) activateTab(next.id);
    else { _activeTabId = null; document.getElementById('content').innerHTML = ''; }
  }
  _renderTabsBar();
}

function activateTab(id){
  if (_activeTabId === id) return;
  _saveActiveTabSnapshot();
  var t = _tabs.find(function(x){return x.id === id;});
  if (!t) return;
  _activeTabId = id;
  _renderTabsBar();
  var m = MENU_INDEX[t.key];
  if (!m) return;
  renderMenu(t.key);
  document.getElementById('crumb').innerHTML = '首页 / <strong>' + t.label + '</strong>';
  // 恢复快照 or 重新渲染
  var snap = _contentSnapshots[id];
  if (t.filter && t.filter.__mode) {
    // v3.4.15: 表单页签用快照恢复 DOM（保留用户已输入内容），不做列表重绑
    if (snap) {
      document.getElementById('content').innerHTML = snap.html;
      setTimeout(function(){ document.getElementById('content').scrollTop = snap.scrollTop || 0; }, 0);
    } else {
      _renderTabContent(t);
    }
    return;
  }
  if (snap) {
    document.getElementById('content').innerHTML = snap.html;
    if (snap.currentList) currentList = snap.currentList;
    setTimeout(function(){ document.getElementById('content').scrollTop = snap.scrollTop || 0; }, 0);
    _rebindListActions();
  } else {
    _renderTabContent(t);
  }
}

function _renderTabContent(t){
  var m = MENU_INDEX[t.key];
  // v3.4.15: 表单页签（新建/编辑/详情）切走再回来时，重建表单而非误当列表查询
  if (t.filter && t.filter.__mode && !t.filter.__custom) {
    _renderFormPage(m, t.filter.__mode, t.filter.__id);
    return;
  }
  if (t.filter && t.filter.__custom === 'order') { _renderOrderCreatePage(m); return; }
  if (t.filter && t.filter.__custom === 'stockmove') { _renderStockMoveCreatePage(m); return; }
  if (m.customView && typeof window[m.customView] === 'function') window[m.customView](t.filter);
  else if (m.render) m.render();
  else if (m.api) renderList(m, t.filter);
}

// 重新绑定列表分页/按钮（从快照恢复后事件丢失，需要重新绑定）
function _rebindListActions(){
  // 简化：如果是列表页，直接重新渲染
  if (currentList && currentList.menu && currentList.menu.api) {
    var m = currentList.menu;
    var filter = currentList.filter;
    renderList(m, filter);
  }
}

function openTab(key, filter, label){
  var m = MENU_INDEX[key]; if (!m) return;
  var displayLabel = label || m.label;
  // filter 相同则激活已有 tab
  var filterKey = filter ? JSON.stringify(filter) : '';
  var existing = _tabs.find(function(t){
    return t.key === key && (JSON.stringify(t.filter||'') === JSON.stringify(filter||''));
  });
  if (existing) { activateTab(existing.id); return; }

  _saveActiveTabSnapshot();
  var tab = {
    id: ++_tabIdSeq,
    key: key,
    label: displayLabel,
    icon: m.icon,
    filter: filter || null,
    pinned: key === 'home'
  };
  _tabs.push(tab);
  _activeTabId = tab.id;
  _renderTabsBar();
  renderMenu(key);
  document.getElementById('crumb').innerHTML = '首页 / <strong>' + displayLabel + '</strong>';
  _renderTabContent(tab);
}

// v3.4.10 列表排序切换
function _toggleSort(key){
  if (!currentList) return;
  if (currentList.sortKey === key) {
    currentList.sortDir = currentList.sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    currentList.sortKey = key;
    currentList.sortDir = 'asc';
  }
  currentList.page = 1;
  reloadList();
}

function reloadList(){
  var m = currentList.menu;
  // v3.4.10: 排序状态从 currentList
  var sortKey = currentList.sortKey || 'updatedAt';
  var sortDir = currentList.sortDir || 'desc';
  var q = '?page=' + currentList.page + '&size=' + currentList.size + '&sort=' + sortKey + ',' + sortDir;
  // v3.4.6 附加 filter 参数
  if (currentList.filter) {
    Object.keys(currentList.filter).forEach(function(k){
      var v = currentList.filter[k];
      if (v != null && v !== '') q += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(v);
    });
  }
  // v3.4.14: 列筛选（固定搜索区 + 表头漏斗）统一传后端，跨全部数据
  if (currentList.colFilters) {
    Object.keys(currentList.colFilters).forEach(function(k){
      var v = currentList.colFilters[k];
      if (v != null && v !== '') q += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(v);
    });
  }
  DMS.api(m.api + q).then(function(d){
    if (d.code !== 0) {
      document.getElementById('listArea').innerHTML = '<div class="dms-error-hint">加载失败：' + d.message + '</div>';
      return;
    }
    var list = (d.data && d.data.list) || (d.data && d.data.data) || (Array.isArray(d.data) ? d.data : []);
    var total = (d.data && d.data.total != null) ? d.data.total : list.length;
    // 前端按 updatedAt 倒序兜底排序（仅在默认排序时生效，避免覆盖用户点列排序）
    if ((currentList.sortKey === 'updatedAt') && currentList.sortDir === 'desc') {
      list.sort(function(a, b){
        var au = a.updatedAt || a.createdAt || '';
        var bu = b.updatedAt || b.createdAt || '';
        return bu.toString().localeCompare(au.toString());
      });
    }
    currentList._raw = list;
    currentList._total = total;
    _renderListTable();
  }).catch(function(e){
    document.getElementById('listArea').innerHTML = '<div class="dms-error-hint">网络错误：' + e.message + '</div>';
  });
}

// v3.4.13/14 列筛选切换（表头漏斗）
function _toggleFilterRow(){
  currentList.showFilters = !currentList.showFilters;

}
// v3.4.14: 列筛选统一传后端，跨全部数据；变更后回到第1页重新查询
function _setColFilter(key, val){
  currentList.colFilters = currentList.colFilters || {};
  if (val == null || val === '') delete currentList.colFilters[key];
  else currentList.colFilters[key] = String(val).trim();
  // 同步固定搜索区与漏斗行两处输入
  currentList.page = 1;
  reloadList();
}
function _clearColFilters(){
  currentList.colFilters = {};
  currentList.page = 1;
  reloadList();
}
// 生成单个筛选控件（select列用下拉，date列用日期，其余文本）
function _filterControlHtml(c, extraStyle){
  var cur = (currentList.colFilters && currentList.colFilters[c.k]) || '';
  var st = 'font-size:12px;padding:4px 6px;border:1px solid #ccc;border-radius:4px;font-weight:normal;' + (extraStyle||'width:100%;');
  var ff = c.filter || {};
  if (ff.type === 'select' && ff.options) {
    var opts = '<option value="">全部</option>' + ff.options.map(function(o){
      return '<option value="'+o.value+'"'+(String(cur)===String(o.value)?' selected':'')+'>'+o.label+'</option>';
    }).join('');
    return '<select onchange="_setColFilter(\''+c.k+'\', this.value)" style="'+st+'">'+opts+'</select>';
  }
  if (ff.type === 'date') {
    return '<input type="date" value="'+cur+'" onchange="_setColFilter(\''+c.k+'\', this.value)" style="'+st+'">';
  }
  return '<input type="text" value="'+cur+'" placeholder="🔎'+c.l+'" onchange="_setColFilter(\''+c.k+'\', this.value)" style="'+st+'">';
}

function _renderListTable(keepFocus){
  var m = currentList.menu;
  var list = (currentList._raw || []).slice();
  var total = currentList._total || 0;
  var totalEl = document.getElementById('totalCnt');
  if (totalEl) totalEl.textContent = total;

  // 列定义中如果没有创建/修改元数据，自动追加
  var cols = m.cols.slice();
  var extraColKeys = cols.map(function(c){ return c.k; });
  if (!m.hideMeta) {
    if (extraColKeys.indexOf('createdBy') < 0 && list.some(function(r){ return r.createdBy != null || r.createdByName; })) cols.push({k:'createdByName',l:'创建人',w:100});
    if (extraColKeys.indexOf('createdAt') < 0 && list.some(function(r){ return r.createdAt; })) cols.push({k:'createdAt',l:'创建时间',w:150});
    if (extraColKeys.indexOf('updatedBy') < 0 && list.some(function(r){ return r.updatedBy != null || r.updatedByName; })) cols.push({k:'updatedByName',l:'最后修改人',w:100});
    if (extraColKeys.indexOf('updatedAt') < 0 && list.some(function(r){ return r.updatedAt; })) cols.push({k:'updatedAt',l:'最后修改',w:150});
  }

  if (!(currentList._raw || []).length) {
    document.getElementById('listArea').innerHTML = _fixedSearchBarHtml(m) + '<div class="dms-empty">📭 暂无数据</div>' + renderPagination(0, 1);
    _bindFixedSearch();
    return;
  }

  var totalPages = Math.max(1, Math.ceil(total / currentList.size));
  var h = _fixedSearchBarHtml(m);
  h += '<table><thead><tr>';
  cols.forEach(function(c){
    var w = c.w ? (' style="width:' + c.w + 'px;cursor:pointer;user-select:none;"') : ' style="cursor:pointer;user-select:none;"';
    var arrow = '';
    if (currentList.sortKey === c.k) arrow = currentList.sortDir === 'asc' ? ' ▲' : ' ▼';
    else arrow = ' <span style="color:#ccc;">⇅</span>';
    h += '<th' + w + ' onclick="_toggleSort(\''+c.k+'\')" title="点击排序">' + c.l + arrow + '</th>';
  });
  if (!m.readonly || m.statusDriven || m.actions) h += '<th style="width:240px;">操作</th>';
  h += '</tr>';
  // 漏斗筛选行（表头即可点出筛选，select列下拉/date列日期/其余文本）
  if (currentList.showFilters) {
    h += '<tr class="dms-filter-row">';
    cols.forEach(function(c){
      h += '<th style="padding:2px 4px;">' + _filterControlHtml(c) + '</th>';
    });
    if (!m.readonly || m.statusDriven || m.actions) h += '<th></th>';
    h += '</tr>';
  }
  h += '</thead><tbody>';

  list.forEach(function(row){
    h += '<tr>';
    cols.forEach(function(c){
      var v = row[c.k];
      if (c.k === 'createdByName' && v == null) v = row.createdBy;
      if (c.k === 'updatedByName' && v == null) v = row.updatedBy;

      // v3.4.13: 单据编号 code 列做成链接，点击打开自身详情
      if (c.k === 'code' && m.detailable && v != null && v !== '') {
        h += '<td><a class="dms-link" onclick="doView(' + row.id + ')">' + v + '</a></td>';
      }
      else if (c.link && v != null && v !== '' && v !== '-') {
        var filterVal = c.link.valueKey ? row[c.link.valueKey] : v;
        var linkLabel = c.linkLabelKey ? (row[c.linkLabelKey] || v) : v;
        h += '<td><a class="dms-link" onclick="openDetailTab(\'' + c.link.menu + '\',' + filterVal + ')">' + linkLabel + '</a></td>';
      }
      else if (c.k === 'status') h += '<td>' + DMS.statusBadge(v) + '</td>';
      else if (c.k === 'createdAt' || c.k === 'updatedAt') h += '<td style="font-size:11px;color:#666;">' + (v ? String(v).replace('T',' ').substring(0,19) : '-') + '</td>';
      else if (typeof v === 'number' && (c.k.indexOf('mount')>0 || c.k.indexOf('rice')>0)) h += '<td>¥ ' + Number(v).toFixed(2) + '</td>';
      else if (typeof v === 'boolean') h += '<td>' + (v ? '✅' : '—') + '</td>';
      else h += '<td>' + DMS.fmt(v, c.k) + '</td>';
    });
    if (!m.readonly || m.statusDriven || m.actions) {
      var id = row.id;
      h += '<td>' +
        '<button class="dms-btn dms-btn-sm" onclick="doView(' + id + ')">👁️ 查看</button>';
      if (m.statusDriven) {
        var acts = actionsForStatus(m, row.status);
        acts.forEach(function(a){
          var cls = 'dms-btn-' + (a.type || 'warn');
          var lbl = a.label;
          var confirmMsg = a.confirm || ('确认' + lbl + '？');
          h += ' <button class="dms-btn dms-btn-sm ' + cls + '" onclick="doStatusAction(' + id + ',\'' + a.key + '\',\'' + a.method + '\',\'' + a.path + '\',\'' + confirmMsg + '\')">' + lbl + '</button>';
        });
      } else if (!m.readonly) {
        if (!m.noEdit) h += ' <button class="dms-btn dms-btn-sm dms-btn-primary" onclick="doEdit(' + id + ')">✏️ 编辑</button>';
        if (m.actions) {
          m.actions.forEach(function(a, idx){
            var cls = 'dms-btn-' + (a.type || 'warn');
            h += ' <button class="dms-btn dms-btn-sm ' + cls + '" onclick="doAction(' + id + ',' + idx + ')">' + a.label + '</button>';
          });
        }
      }
      h += '</td>';
    }
    h += '</tr>';
  });
  h += '</tbody></table>';
  h += renderPagination(total, totalPages);
  document.getElementById('listArea').innerHTML = h;
  _bindFixedSearch();
}

// v3.4.14: 固定搜索区（列表顶部常驻，按菜单 searchFields 定制）

// ============ 完整分页组件 ============
function renderPagination(total, totalPages){
  var p = currentList.page;
  var size = currentList.size;
  var canPrev = p > 1;
  var canNext = p < totalPages;
  return '<div class="dms-pagination" style="display:flex;align-items:center;gap:8px;padding:12px 8px;font-size:13px;flex-wrap:wrap;">' +
    '<span>共 <strong>' + total + '</strong> 条 · 共 <strong>' + totalPages + '</strong> 页</span>' +
    '<button class="dms-btn dms-btn-sm" ' + (canPrev?'':'disabled') + ' onclick="goPage(1)">首页</button>' +
    '<button class="dms-btn dms-btn-sm" ' + (canPrev?'':'disabled') + ' onclick="goPage(' + (p-1) + ')">上一页</button>' +
    '<span>第 <strong>' + p + '</strong> / ' + totalPages + ' 页</span>' +
    '<button class="dms-btn dms-btn-sm" ' + (canNext?'':'disabled') + ' onclick="goPage(' + (p+1) + ')">下一页</button>' +
    '<button class="dms-btn dms-btn-sm" ' + (canNext?'':'disabled') + ' onclick="goPage(' + totalPages + ')">末页</button>' +
    '<span style="margin-left:12px;">跳至 <input type="number" id="jumpInput" min="1" max="' + totalPages + '" value="' + p + '" style="width:60px;padding:4px 8px;border:1px solid #d9d9d9;border-radius:3px;"> 页</span>' +
    '<button class="dms-btn dms-btn-sm" onclick="jumpToPage()">跳转</button>' +
    '<span style="margin-left:12px;">每页 <select id="pageSizeSel" onchange="changePageSize(this.value)" style="padding:4px 8px;border:1px solid #d9d9d9;border-radius:3px;">' +
      [10,20,50,100,200].map(function(s){ return '<option value="' + s + '"' + (s===size?' selected':'') + '>' + s + ' 条</option>'; }).join('') +
    '</select></span>' +
    '</div>';
}

function goPage(p){
  var totalPages = 1;
  try { totalPages = parseInt(document.querySelector('.dms-pagination strong:nth-of-type(2)').textContent) || 1; } catch(e) {}
  if (p < 1) p = 1;
  if (p > totalPages) p = totalPages;
  currentList.page = p;
  reloadList();
}

function jumpToPage(){
  var v = parseInt(document.getElementById('jumpInput').value);
  if (!isNaN(v)) goPage(v);
}

function changePageSize(s){
  currentList.size = parseInt(s);
  currentList.page = 1;
  reloadList();
}

// ============ 导入 / 导出 / 模板下载 ============
function doExport(){
  var m = currentList.menu;
  DMS.toast('正在导出...', 'info');
  // 拉取全部数据
  DMS.api(m.api + '?page=1&size=99999&sort=updatedAt,desc').then(function(d){
    if (d.code !== 0) { DMS.toast('导出失败：' + d.message, 'error'); return; }
    var list = (d.data && d.data.list) || (d.data && d.data.data) || (Array.isArray(d.data) ? d.data : []);
    if (!list.length) { DMS.toast('无数据可导出', 'warn'); return; }
    downloadCsv(m.label, list);
  });
}

function downloadCsv(name, list){
  // 提取所有字段
  var keys = [];
  list.forEach(function(row){
    Object.keys(row).forEach(function(k){
      if (keys.indexOf(k) < 0 && typeof row[k] !== 'object') keys.push(k);
    });
  });
  // 生成 CSV（Excel 兼容 · UTF-8 BOM）
  var csv = '\ufeff';
  csv += keys.map(function(k){ return DMS.labelOf ? DMS.labelOf(k) : k; }).join(',') + '\n';
  list.forEach(function(row){
    csv += keys.map(function(k){
      var v = row[k];
      if (v == null) return '';
      var s = String(v).replace(/"/g, '""');
      if (s.indexOf(',') >= 0 || s.indexOf('\n') >= 0 || s.indexOf('"') >= 0) s = '"' + s + '"';
      return s;
    }).join(',') + '\n';
  });
  var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = name + '_' + new Date().toISOString().substring(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  DMS.toast('已导出 ' + list.length + ' 条数据', 'success');
}

function doDownloadTemplate(){
  var m = currentList.menu;
  if (!m.form) { DMS.toast('该模块无表单定义，无法生成模板', 'warn'); return; }
  var flat = flattenFields(m.form);
  var headers = flat.filter(function(f){ return f.type !== 'lines'; }).map(function(f){ return f.key + '(' + f.label + (f.required?' *':'') + ')'; });
  var csv = '\ufeff' + headers.join(',') + '\n';
  // 示例行
  csv += headers.map(function(){ return ''; }).join(',') + '\n';
  var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = m.label + '_导入模板.csv'; a.click();
  URL.revokeObjectURL(url);
  DMS.toast('模板已下载', 'success');
}

function flattenFields(fields){
  var out = [];
  (fields || []).forEach(function(f){
    if (f.type === 'lines') return;
    out.push(f);
  });
  return out;
}

function doImport(){
  var m = currentList.menu;
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.csv,.xlsx,.xls,text/csv';
  input.onchange = function(e){
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){
      var text = ev.target.result;
      // 移除 BOM
      if (text.charCodeAt(0) === 0xFEFF) text = text.substring(1);
      var rows = parseCsv(text);
      if (rows.length < 2) { DMS.toast('文件为空或只有标题行', 'warn'); return; }
      var headers = rows[0].map(function(h){
        // 提取括号前的 key（模板生成时格式是 "key(label)"）
        var m = /^([^\(]+)/.exec(h);
        return m ? m[1].trim() : h.trim();
      });
      var records = [];
      for (var i = 1; i < rows.length; i++) {
        var row = rows[i];
        if (row.every(function(c){ return c === '' || c == null; })) continue;
        var obj = {};
        headers.forEach(function(h, idx){
          if (row[idx] !== undefined && row[idx] !== '') obj[h] = row[idx];
        });
        records.push(obj);
      }
      if (!records.length) { DMS.toast('无有效数据', 'warn'); return; }
      DMS.confirm('确认导入 ' + records.length + ' 条数据？重复的编码会失败。', function(){
        importBatch(m, records);
      });
    };
    reader.readAsText(file, 'UTF-8');
  };
  input.click();
}

function parseCsv(text){
  var rows = [];
  var cur = [];
  var field = '';
  var inQuote = false;
  for (var i = 0; i < text.length; i++) {
    var c = text[i];
    if (inQuote) {
      if (c === '"') {
        if (text[i+1] === '"') { field += '"'; i++; }
        else inQuote = false;
      } else field += c;
    } else {
      if (c === '"') inQuote = true;
      else if (c === ',') { cur.push(field); field = ''; }
      else if (c === '\n') { cur.push(field); rows.push(cur); cur = []; field = ''; }
      else if (c === '\r') {}
      else field += c;
    }
  }
  if (field !== '' || cur.length) { cur.push(field); rows.push(cur); }
  return rows;
}

function importBatch(m, records){
  var success = 0, failed = 0;
  var errors = [];
  var idx = 0;
  function next(){
    if (idx >= records.length) {
      DMS.toast('导入完成：成功 ' + success + ' 条 · 失败 ' + failed + ' 条', failed?'warn':'success');
      if (errors.length) console.warn('导入错误:', errors);
      reloadList();
      return;
    }
    var rec = records[idx++];
    DMS.api(m.api, { method:'POST', body: rec }).then(function(d){
      if (d.code === 0) success++;
      else { failed++; errors.push('第 ' + idx + ' 行: ' + d.message); }
      next();
    }).catch(function(e){
      failed++; errors.push('第 ' + idx + ' 行: ' + e.message);
      next();
    });
  }
  next();
}

function doCreate(){
  var m = currentList.menu;
  // v3.4.8：销售订单/采购订单也走 Tab 内下单页
  if (m.key === 'orders') {
    openOrderCreateTab(m, 'sales');
    return;
  }
  if (m.key === 'purchase-orders') {
    openOrderCreateTab(m, 'purchase');
    return;
  }
  // v3.4.15: 库存移动多方式创建页
  if (m.key === 'stock-moves') {
    openStockMoveCreateTab(m);
    return;
  }
  // v3.4.7 主表单类子页 Tab
  if (m.form && m.form.length > 4) {
    openFormTab(m, 'create', null);
    return;
  }
  DMS.form({
    title: '新建 · ' + m.label,
    okText: '保存',
    fields: m.form,
    onSubmit: function(data){
      return DMS.api(m.api, { method:'POST', body: data }).then(function(d){
        if (d.code === 0) {
          DMS.toast('新建成功', 'success');
          // v3.4.7: 保持在当前列表 Tab，仅刷新
          reloadList();
          return true;
        }
        DMS.toast('新建失败：' + d.message, 'error'); return false;
      });
    }
  });
}

// ============ v3.4.7 表单 Tab（新建/编辑/详情统一样式）============
function openFormTab(m, mode, id){
  var suffix = mode === 'create' ? '新建' : (mode === 'edit' ? ('编辑 #' + id) : ('详情 #' + id));
  var tabLabel = m.label + ' - ' + suffix;
  var filter = { __mode: mode, __id: id, __ts: mode==='create' ? Date.now() : id };
  _saveActiveTabSnapshot();
  var tab = {
    id: ++_tabIdSeq,
    key: m.key,
    label: tabLabel,
    icon: mode==='create'?'➕':(mode==='edit'?'✏️':'👁️'),
    filter: filter,
    pinned: false
  };
  _tabs.push(tab);
  _activeTabId = tab.id;
  _renderTabsBar();
  document.getElementById('crumb').innerHTML = '首页 / <strong>' + tabLabel + '</strong>';
  _renderFormPage(m, mode, id);
}

function _renderFormPage(m, mode, id){
  var content = document.getElementById('content');
  var isView = mode === 'view';
  content.innerHTML =
    '<div class="dms-page-title">' + (mode==='create'?'➕ 新建 ':(mode==='edit'?'✏️ 编辑 ':'👁️ 详情 ')) + m.label + (id?' #'+id:'') + '</div>' +
    '<div class="dms-page-sub"><a class="dms-link" onclick="_backToListTab(\''+m.key+'\')">← 返回列表</a></div>' +
    '<div class="dms-card"><div id="formTabBody"><div class="dms-loading">加载中...</div></div></div>' +
    (isView || mode==='edit' ? '<div class="dms-card"><div class="dms-card-title"><span>📜 操作/审批/自动执行历史</span></div><div id="historyTrack"><div class="dms-loading">加载中...</div></div></div>' : '');

  if (mode === 'create') {
    _renderFormBody(m, {}, false);
  } else {
    var detailPath = m.detailable ? (m.api + '/' + id + '/detail') : (m.api + '/' + id);
    DMS.api(detailPath).then(function(d){
      if (d.code !== 0) { document.getElementById('formTabBody').innerHTML = '<div class="dms-error-hint">' + d.message + '</div>'; return; }
      _renderFormBody(m, d.data || {}, isView);
      _loadHistoryTrack(m, id);
    });
  }
}

function _renderFormBody(m, data, isView){
  var body = document.getElementById('formTabBody');
  var fields = m.form || [];
  // v3.4.12: key(去掉尾部 Id) → 名称字段。dealerId→dealerName 等
  var linkFieldMap = {
    dealerId: {menu:'dealers', nameKey:'dealerName'},
    productId: {menu:'products', nameKey:'productName'},
    warehouseId: {menu:'warehouses', nameKey:'warehouseName'},
    terminalId: {menu:'hospitals', nameKey:'terminalName'},
    supplierId: {menu:'suppliers', nameKey:'supplierName'},
    categoryId: {menu:'categories', nameKey:'categoryName'},
    sourceOrderId: {menu:'orders', nameKey:'sourceOrderCode'},
    sourcePoId: {menu:'purchase-orders', nameKey:'sourcePoCode'}
  };
  var html = '<div class="dms-form-grid">';
  fields.forEach(function(f){
    // v3.4.12: lines 字段单独用明细表渲染，跳过普通字段循环，避免 [object Object]
    if (f.type === 'lines') return;
    var val = data[f.key];
    var fm = linkFieldMap[f.key];
    // 名称优先级：后端返回的 xxxName / xxxCode → 原值
    var nameVal = fm && data[fm.nameKey] ? data[fm.nameKey] : (data[f.key + 'Name'] || data[f.key + 'Code']);
    var displayVal = nameVal || val;
    var isLink = isView && fm && val;
    var fullClass = f.full ? 'dms-form-full' : '';
    html += '<div class="dms-form-item ' + fullClass + '">' +
      '<label>' + (f.required?'<span style="color:var(--md-error);">*</span> ':'') + f.label + '</label>';
    if (isView) {
      if (isLink) {
        var lval = displayVal || val;
        html += '<div style="padding:8px 10px;background:var(--md-surface-variant);border-radius:var(--md-radius);"><a class="dms-link" onclick="openDetailTab(\''+fm.menu+'\','+val+')">' + lval + '</a></div>';
      } else {
        var showVal = val == null ? '-' : String(val);
        if (f.type === 'select' && f.options) {
          var opt = f.options.find(function(o){return o.value===val;});
          if (opt) showVal = opt.label;
        } else if (f.type === 'boolean') {
          showVal = (val === true || val === 'true' || val === 1 || val === '1') ? '是' : '否';
        } else if (f.type === 'multiselect') {
          showVal = (val == null || val === '') ? '-' : String(val);
        }
        html += '<div style="padding:8px 10px;background:var(--md-surface-variant);border-radius:var(--md-radius);min-height:34px;">' + showVal + '</div>';
      }
    } else {
      // v3.4.10: 支持 select / product-picker；v3.4.12: picker.resource 下拉
      if (f.type === 'select' && f.options) {
        var opts = f.options.map(function(o){
          return '<option value="'+o.value+'"'+(String(val)===String(o.value)?' selected':'')+'>'+o.label+'</option>';
        }).join('');
        html += '<select data-form-key="'+f.key+'"><option value="">-- 请选择 --</option>'+opts+'</select>';
      } else if (f.type === 'multiselect' && f.picker && f.picker.resource) {
        html += '<div data-multi-key="'+f.key+'" data-multi-resource="'+f.picker.resource+'" data-multi-val="'+(val==null?'':String(val))+'" style="border:1px solid var(--md-outline);border-radius:6px;padding:6px;max-height:140px;overflow-y:auto;">加载中...</div>';
      } else if (f.picker && f.picker.resource) {
        html += '<select data-form-key="'+f.key+'" data-picker-resource="'+f.picker.resource+'" data-picker-val="'+(val==null?'':val)+'"><option value="">加载中...</option></select>';
      } else if (f.type === 'boolean') {
        var bchecked = (val === true || val === 'true' || val === 1 || val === '1');
        html += '<label style="display:inline-flex;align-items:center;gap:8px;cursor:pointer;">' +
          '<input type="checkbox" data-form-key="'+f.key+'" data-form-bool="1"'+(bchecked?' checked':'')+' style="width:auto;"> 是' +
          '</label>';
      } else if (f.type === 'number') {
        html += '<input type="number" step="any" data-form-key="'+f.key+'" value="'+(val==null?'':String(val))+'" placeholder="'+(f.placeholder||f.label)+'">';
      } else if (f.type === 'product-picker') {
        var ppText = data.productCode ? (data.productCode + (data.productName?(' '+data.productName):'')) : (val ? ('已选：#' + val) : '');
        var showLabel = ppText || '点击选择产品...';
        html += '<div style="display:flex;gap:8px;align-items:center;">' +
          '<input type="hidden" data-form-key="'+f.key+'" value="'+(val==null?'':val)+'">' +
          '<span id="pp-label-'+f.key+'" style="flex:1;padding:6px 10px;border:1px solid var(--md-outline);border-radius:6px;cursor:pointer;background:white;" onclick="_openProductPickerForField(\''+f.key+'\')">'+showLabel+'</span>' +
          '<button class="dms-btn dms-btn-sm" onclick="_openProductPickerForField(\''+f.key+'\')">选择</button>' +
          '</div>';
      } else if (f.type === 'date') {
        var dval = val==null?'':String(val).substring(0,10);
        html += '<input type="date" data-form-key="'+f.key+'" value="'+dval+'">';
      } else if (f.type === 'textarea') {
        html += '<textarea data-form-key="'+f.key+'" rows="2" placeholder="'+(f.placeholder||f.label)+'" style="width:100%;">'+(val==null?'':String(val).replace(/</g,'&lt;'))+'</textarea>';
      } else {
        html += '<input type="text" data-form-key="' + f.key + '" value="' + (val==null?'':String(val).replace(/"/g,'&quot;')) + '" placeholder="' + (f.placeholder||f.label) + '">';
      }
    }
    html += '</div>';
  });
  html += '</div>';
  // v3.4.13: 可编辑明细录入（新建/编辑态，菜单含 lines 字段）
  var linesField = fields.find(function(f){ return f.type === 'lines'; });
  if (!isView && linesField) {
    html += '<div class="dms-card-title" style="margin-top:16px;"><span>📋 ' + (linesField.label||'明细') + '</span>' +
            '<div class="actions"><button class="dms-btn dms-btn-sm dms-btn-primary" onclick="_addLineRow()">➕ 添加明细</button></div></div>';
    html += '<table id="linesEditor"><thead><tr>';
    linesField.cols.forEach(function(c){ html += '<th>' + (c.required?'<span style="color:#e74c3c;">*</span>':'') + c.l + '</th>'; });
    html += '<th style="width:60px;">操作</th></tr></thead><tbody></tbody></table>';
    window._curLinesField = linesField;
  }
  // 明细行区（如有）
  if (data.lines && Array.isArray(data.lines) && data.lines.length) {
    var isRecvSo = (m.key==='receipts' || m.key==='sales-outs');
    var qtyHead = isRecvSo ? '<th>应收/发</th><th>已收/发</th><th>待处理</th>' : '<th>数量</th><th>单价</th><th>小计</th>';
    html += '<div class="dms-card-title" style="margin-top:16px;"><span>📋 明细行 (' + data.lines.length + ')</span></div>';
    html += '<table><thead><tr><th>#</th><th>产品编码</th><th>产品名称</th><th>规格</th>' + qtyHead + '</tr></thead><tbody>';
    data.lines.forEach(function(l, i){
      var pName = l.productName || '-';
      var pCode = l.productCode || '-';
      var linkedName = l.productId ? '<a class="dms-link" onclick="openDetailTab(\'products\','+l.productId+')">' + pName + '</a>' : pName;
      var cells;
      if (isRecvSo) {
        var exp = l.expectedQty!=null?l.expectedQty:(l.qty||0);
        var done = (l.receivedQty!=null?l.receivedQty:(l.shippedQty!=null?l.shippedQty:0));
        var pending = Number(exp) - Number(done);
        cells = '<td>' + exp + '</td><td>' + done + '</td><td style="color:'+(pending>0?'#e67e22':'#27ae60')+';font-weight:600;">' + pending + '</td>';
      } else {
        cells = '<td>' + (l.qty||0) + '</td><td>¥ ' + Number(l.unitPrice||0).toFixed(2) + '</td>' +
          '<td>¥ ' + Number(l.subTotal || (l.qty*l.unitPrice) || 0).toFixed(2) + '</td>';
      }
      html += '<tr><td>' + (i+1) + '</td><td>' + pCode + '</td><td>' + linkedName + '</td>' +
        '<td>' + (l.productSpec||l.spec||'-') + '</td>' + cells + '</tr>';
    });
    html += '</tbody></table>';
  }
  // v3.4.13: 关联源单表头信息（需求9）
  if (isView && data.sourceOrder) {
    var so = data.sourceOrder;
    html += '<div class="dms-card-title" style="margin-top:16px;"><span>🔗 关联销售订单</span></div>' +
      '<div class="dms-form-grid" style="background:var(--md-surface-variant);padding:10px;border-radius:6px;">' +
      '<div class="dms-form-item"><label>订单号</label><div>' + (so.code||'-') + '</div></div>' +
      '<div class="dms-form-item"><label>经销商</label><div>' + (so.dealerName||'-') + '</div></div>' +
      '<div class="dms-form-item"><label>订单类型</label><div>' + (so.orderType||'-') + '</div></div>' +
      '<div class="dms-form-item"><label>状态</label><div>' + DMS.statusBadge(so.status) + '</div></div>' +
      '<div class="dms-form-item"><label>含税金额</label><div>¥ ' + Number(so.amountInclTax||0).toFixed(2) + '</div></div>' +
      '<div class="dms-form-item"><label>下单时间</label><div>' + (so.createdAt||'-') + '</div></div>' +
      '</div>';
  }
  if (isView && data.sourcePo) {
    var po = data.sourcePo;
    html += '<div class="dms-card-title" style="margin-top:16px;"><span>🔗 关联采购订单</span></div>' +
      '<div class="dms-form-grid" style="background:var(--md-surface-variant);padding:10px;border-radius:6px;">' +
      '<div class="dms-form-item"><label>采购单号</label><div>' + (po.code||'-') + '</div></div>' +
      '<div class="dms-form-item"><label>供应商</label><div>' + (po.supplierName||'-') + '</div></div>' +
      '<div class="dms-form-item"><label>状态</label><div>' + DMS.statusBadge(po.status) + '</div></div>' +
      '<div class="dms-form-item"><label>含税金额</label><div>¥ ' + Number(po.amountInclTax||0).toFixed(2) + '</div></div>' +
      '<div class="dms-form-item"><label>下单时间</label><div>' + (po.createdAt||'-') + '</div></div>' +
      '</div>';
  }
  // v3.4.12: 收发货执行记录（每次每批次）
  if (isView && data.executionLines && data.executionLines.length) {
    var isRecv = m.key === 'receipts';
    html += '<div class="dms-card-title" style="margin-top:16px;"><span>🔖 ' + (isRecv?'收货':'发货') + '执行记录 (' + data.executionLines.length + ' 笔)</span></div>';
    html += '<table><thead><tr><th>次序</th><th>产品</th><th>批次号</th><th>序列号</th><th>数量</th><th>操作人</th><th>时间</th></tr></thead><tbody>';
    data.executionLines.forEach(function(e){
      html += '<tr><td>第' + e.seqNo + '次</td>' +
        '<td>' + (e.productCode||'') + ' ' + (e.productName||'') + '</td>' +
        '<td>' + (e.batchNo||'-') + '</td>' +
        '<td>' + (e.serialNo||'-') + '</td>' +
        '<td style="font-weight:600;">' + e.qty + '</td>' +
        '<td>' + (e.operatorName||'-') + '</td>' +
        '<td>' + String(e.createdAt||'').replace('T',' ').substring(0,19) + '</td></tr>';
    });
    html += '</tbody></table>';
  }
  // v3.4.12: 操作日志时间轴
  var logRt = _detailResourceType(m.key);
  if (isView && logRt && data.id) {
    html += '<div class="dms-card-title" style="margin-top:16px;"><span>🕓 操作记录</span></div>' +
            '<div id="formOpLogBox" style="padding:4px 12px;"><span style="color:#bbb;font-size:12px;">加载中…</span></div>';
  }
  // 底部按钮
  if (!isView) {
    html += '<div style="margin-top:16px;text-align:right;">' +
      '<button class="dms-btn" onclick="_backToListTab(\''+m.key+'\')">取消</button> ' +
      '<button class="dms-btn dms-btn-primary" onclick="_submitFormTab(\''+m.key+'\',\''+(data.id||'')+'\')">' + (data.id ? '更新' : '保存') + '</button>' +
      '</div>';
  } else {
    html += '<div style="margin-top:16px;text-align:right;">' +
      '<button class="dms-btn" onclick="_backToListTab(\''+m.key+'\')">返回列表</button>' +
      '</div>';
  }
  body.innerHTML = html;
  // v3.4.12: 异步填充 picker 下拉
  body.querySelectorAll('select[data-picker-resource]').forEach(function(sel){
    var res = sel.getAttribute('data-picker-resource');
    var cur = sel.getAttribute('data-picker-val');
    DMS.api('/api/lookups/' + res).then(function(r){
      if (r.code !== 0) { sel.innerHTML = '<option value="">加载失败</option>'; return; }
      var opts = '<option value="">-- 请选择 --</option>';
      (r.data||[]).forEach(function(o){
        var oid = o.id != null ? o.id : o.value;
        var oname = o.name || o.label || o.nameCn || oid;
        opts += '<option value="'+oid+'"'+(String(cur)===String(oid)?' selected':'')+'>'+oname+'</option>';
      });
      sel.innerHTML = opts;
    });
  });
  // v3.4.14: 异步填充 multiselect 多选复选框
  body.querySelectorAll('div[data-multi-resource]').forEach(function(box){
    var res = box.getAttribute('data-multi-resource');
    var cur = (box.getAttribute('data-multi-val')||'').split(',').map(function(s){return s.trim();}).filter(Boolean);
    DMS.api('/api/lookups/' + res).then(function(r){
      if (r.code !== 0) { box.innerHTML = '加载失败'; return; }
      var h = '';
      (r.data||[]).forEach(function(o){
        var oid = o.id != null ? o.id : o.value;
        var oname = o.name || o.label || o.nameCn || oid;
        var ck = cur.indexOf(String(oid)) >= 0 ? ' checked' : '';
        h += '<label style="display:block;padding:2px 0;cursor:pointer;font-weight:normal;"><input type="checkbox" class="dms-multi-cb" value="'+oid+'"'+ck+' style="width:auto;margin-right:6px;">'+oname+'</label>';
      });
      box.innerHTML = h || '<span style="color:#bbb;">无可选项</span>';
    });
  });
  if (isView && logRt && data.id) {
    DMS.api('/api/operation-logs?resourceType=' + logRt + '&resourceId=' + data.id).then(function(r){
      var el = document.getElementById('formOpLogBox');
      if (!el) return;
      if (r.code !== 0 || !r.data || !r.data.length) { el.innerHTML = '<span style="color:#bbb;font-size:12px;">暂无操作记录</span>'; return; }
      var lh = '<div style="border-left:2px solid #e6f4ff;margin-left:6px;">';
      r.data.forEach(function(log){
        var note = ''; try { note = log.detail && log.detail.note ? log.detail.note : ''; } catch(e){}
        lh += '<div style="position:relative;padding:6px 0 6px 18px;">' +

function _submitFormTab(menuKey, id){
  var m = MENU_INDEX[menuKey];
  var body = {};
  document.querySelectorAll('#formTabBody .dms-form-grid [data-form-key]').forEach(function(el){
    if (el.getAttribute('data-form-bool') === '1') {
      body[el.getAttribute('data-form-key')] = el.checked;
    } else {
      body[el.getAttribute('data-form-key')] = el.value;
    }
  });
  // v3.4.14: 收集 multiselect 多选（逗号分隔）
  document.querySelectorAll('#formTabBody div[data-multi-key]').forEach(function(box){
    var vals = [];
    box.querySelectorAll('.dms-multi-cb:checked').forEach(function(cb){ vals.push(cb.value); });
    body[box.getAttribute('data-multi-key')] = vals.join(',');
  });
  // v3.4.13: 收集明细行
  var linesField = (m.form||[]).find(function(f){ return f.type === 'lines'; });
  if (linesField) {
    var rows = document.querySelectorAll('#linesEditor tbody tr');
    var lines = [];
    var bad = false;
    rows.forEach(function(tr){
      var line = {};
      linesField.cols.forEach(function(c){
        var el = tr.querySelector('[data-line-key="'+c.k+'"]');
        if (el) line[c.k] = el.value;
      });
      // 跳过完全空行
      if (!line.productId && !line.qty) return;
      if (!line.productId || !line.qty || Number(line.qty) <= 0) bad = true;
      lines.push(line);
    });
    if (!lines.length) { DMS.toast('请至少添加一条明细', 'error'); return; }
    if (bad) { DMS.toast('明细的产品和数量必填且数量需大于0', 'error'); return; }
    body.lines = lines;
  }
  var url = id ? (m.api + '/' + id) : m.api;
  var method = id ? 'PUT' : 'POST';
  DMS.api(url, { method: method, body: body }).then(function(d){
    if (d.code === 0) {
      DMS.toast(id ? '更新成功' : '新建成功', 'success');
      _backToListTab(menuKey, true);
    } else {
      DMS.toast('保存失败：' + d.message, 'error');
    }
  });
}

function _addLineRow(preset){
  var lf = window._curLinesField;
  if (!lf) return;
  var tbody = document.querySelector('#linesEditor tbody');
  if (!tbody) return;
  var tr = document.createElement('tr');
  var html = '';
  lf.cols.forEach(function(c){
    if (c.type === 'picker') {
      html += '<td><select data-line-key="'+c.k+'" data-line-picker="'+c.picker+'"><option value="">加载中...</option></select></td>';
    } else if (c.type === 'number') {
      html += '<td><input type="number" step="any" data-line-key="'+c.k+'" style="width:90px;" value="'+((preset&&preset[c.k]!=null)?preset[c.k]:'')+'"></td>';
    } else {
      html += '<td><input type="text" data-line-key="'+c.k+'" style="width:110px;" value="'+((preset&&preset[c.k]!=null)?preset[c.k]:'')+'"></td>';
    }
  });
  html += '<td><button class="dms-btn dms-btn-sm dms-btn-danger" onclick="this.closest(\'tr\').remove()">删除</button></td>';
  tr.innerHTML = html;
  tbody.appendChild(tr);
  // 异步填充 picker 下拉
  tr.querySelectorAll('select[data-line-picker]').forEach(function(sel){
    var res = sel.getAttribute('data-line-picker');
    var presetVal = preset && preset[sel.getAttribute('data-line-key')];
    DMS.api('/api/lookups/' + res).then(function(r){
      if (r.code !== 0) { sel.innerHTML = '<option value="">加载失败</option>'; return; }
      var opts = '<option value="">-- 请选择 --</option>';
      (r.data||[]).forEach(function(o){
        var oid = o.id != null ? o.id : o.value;
        var oname = o.name || o.label || o.nameCn || oid;
        opts += '<option value="'+oid+'"'+(String(presetVal)===String(oid)?' selected':'')+'>'+oname+'</option>';
      });
      sel.innerHTML = opts;
    });
  });
}

function _backToListTab(menuKey, refresh){
  // 关闭当前 Tab，激活/新建列表 Tab
  var curId = _activeTabId;
  var listTab = _tabs.find(function(t){
    return t.key === menuKey && !(t.filter && t.filter.__mode);
  });
  if (listTab) {
    // 有列表 Tab
    if (curId !== listTab.id) {
      _tabs = _tabs.filter(function(t){return t.id !== curId;});
      delete _contentSnapshots[curId];
      activateTab(listTab.id);
      if (refresh) setTimeout(reloadList, 100);
    } else {
      if (refresh) reloadList();
    }
  } else {
    // 打开列表 Tab（会覆盖当前）
    _tabs = _tabs.filter(function(t){return t.id !== curId;});
    delete _contentSnapshots[curId];
    _activeTabId = null;
    openTab(menuKey, null);
  }
  _renderTabsBar();
}

function _renderOrderLines(){

    (isSales ? '<th style="width:110px;">可用库存</th>' : '') +

    '<th style="width:120px;">小计</th>' +
    '<th style="width:60px;"></th>' +
    '</tr></thead><tbody>';

  _orderDraft.lines.forEach(function(l, i){
    var sub = Number(l.qty||0) * Number(l.unitPrice||0);

    var pickerLabel = l.productName ? (l.productCode + ' · ' + l.productName) : '点击选择产品...';
    var stockCell = '';
    if (isSales) {
      var stockText = l.stockQty == null ? '<span style="color:#999;">-</span>'
        : (Number(l.stockQty) > 0
            ? '<span style="color:var(--md-success);font-weight:500;">' + Number(l.stockQty).toFixed(0) + '</span>'
            : '<span style="color:var(--md-error);font-weight:500;">0</span>');

    html += '<tr>' +
      '<td>' + (i+1) + '</td>' +
      '<td><a class="dms-link" onclick="_pickProductForLine(' + i + ')" style="cursor:pointer;">' + pickerLabel + '</a></td>' +
      '<td>' + (l.unitType || 'EA') + '</td>' +
      stockCell +
      '<td><input type="number" min="1" value="' + (l.qty||1) + '" style="width:70px;padding:4px 6px;" onchange="_orderDraft.lines['+i+'].qty=Number(this.value);_renderOrderLines();"></td>' +
      '<td><input type="number" min="0" step="0.01" value="' + (l.unitPrice||0) + '" style="width:100px;padding:4px 6px;" onchange="_orderDraft.lines['+i+'].unitPrice=Number(this.value);_renderOrderLines();"></td>' +

      '</tr>';

  el.innerHTML = html;
  document.getElementById('orderTotal').textContent = '¥ ' + total.toFixed(2);

function _pickProductForLine(idx){
  var isSales = _orderDraft.mode === 'sales';
  var extra = {};
  if (isSales) {
    if (!_orderDraft.dealerId) { DMS.toast('请先选择经销商', 'warn'); return; }
    extra.dealerId = _orderDraft.dealerId;
  }
  // 使用现有 picker
  var params = 'limit=200' + (extra.dealerId ? '&dealerId=' + extra.dealerId : '');
  DMS.api('/api/lookups/products?' + params).then(function(r){
    if (r.code !== 0) { DMS.toast('加载产品失败', 'error'); return; }
    var products = r.data || [];
    if (!products.length) {
      DMS.toast(isSales ? '该经销商无授权产品' : '无可选产品', 'warn');
      return;
    }
    // 用 confirm 弹窗展示选择列表
    var searchInput = '<input type="text" id="prodSearch" placeholder="🔍 输入产品编码/名称搜索..." style="width:100%;padding:6px 10px;border:1px solid var(--md-outline);border-radius:6px;margin-bottom:8px;">';
    var listHtml = '<div id="prodPickList" style="max-height:400px;overflow-y:auto;border:1px solid var(--md-outline-variant);border-radius:6px;">';
    products.forEach(function(p){
      listHtml += '<div class="prod-pick-item" data-pid="' + p.id + '" data-pcode="' + p.code + '" data-pname="' + (p.nameCn || p.name || '').replace(/"/g,'&quot;') + '" data-price="' + (p.priceRetail || p.price || 0) + '" data-unit="' + (p.unitType || 'EA') + '" style="padding:8px 10px;border-bottom:1px solid var(--md-outline-variant);cursor:pointer;">' +
        '<strong>' + p.code + '</strong> · ' + (p.nameCn || p.name || '-') +
        (p.spec ? '<span style="color:#999;font-size:11px;margin-left:6px;">' + p.spec + '</span>' : '') +
        '<span style="color:#999;font-size:11px;margin-left:6px;">[' + (p.unitType||'EA') + ']</span>' +
        '</div>';
    });
    listHtml += '</div>';
    DMS.confirm(searchInput + listHtml, function(){
      // 通过 data-selected 标记选中
      var sel = document.querySelector('.prod-pick-item.selected');
      if (!sel) { DMS.toast('请选择产品', 'warn'); return false; }
      _orderDraft.lines[idx].productId = Number(sel.getAttribute('data-pid'));
      _orderDraft.lines[idx].productCode = sel.getAttribute('data-pcode');
      _orderDraft.lines[idx].productName = sel.getAttribute('data-pname');
      _orderDraft.lines[idx].unitPrice = Number(sel.getAttribute('data-price'));
      _orderDraft.lines[idx].unitType = sel.getAttribute('data-unit') || 'EA';
      _orderDraft.lines[idx].stockQty = null; // 待查询
      _renderOrderLines();
      // v3.4.9：异步查该产品在系统里的可用库存（qualified 合格库存合计）
      if (isSales) {
        DMS.api('/api/inventory/available-lots?productId=' + _orderDraft.lines[idx].productId + '&status=QUALIFIED').then(function(rr){
          if (rr.code === 0) {
            var total = (rr.data || []).reduce(function(s, x){ return s + Number(x.qty || 0); }, 0);
            _orderDraft.lines[idx].stockQty = total;
            _renderOrderLines();
          }
        });
      }
    }, '选择产品');
    // 绑定选中 + 搜索
    setTimeout(function(){
      document.querySelectorAll('.prod-pick-item').forEach(function(el){
        el.addEventListener('click', function(){
          document.querySelectorAll('.prod-pick-item').forEach(function(x){ x.classList.remove('selected'); x.style.background=''; });
          el.classList.add('selected');
          el.style.background = 'var(--md-primary-container)';
        });
      });
      var si = document.getElementById('prodSearch');
      if (si) si.addEventListener('input', function(){
        var kw = si.value.toLowerCase();
        document.querySelectorAll('.prod-pick-item').forEach(function(el){
          var t = el.textContent.toLowerCase();
          el.style.display = t.indexOf(kw) >= 0 ? '' : 'none';
        });
      });
    }, 50);
  });
}

function _submitOrder(menuKey){
  var isSales = _orderDraft.mode === 'sales';
  var m = MENU_INDEX[menuKey];
  var orderType = null;
  if (isSales) {
    var dealerId = document.getElementById('fld-dealer').value;
    if (!dealerId) { DMS.toast('请选择经销商', 'warn'); return; }
    _orderDraft.dealerId = Number(dealerId);
    orderType = document.getElementById('fld-orderType').value;
    if (!orderType) { DMS.toast('请选择订单类型', 'warn'); return; }
  } else {
    if (!_orderDraft.supplierId) { DMS.toast('请选择供应商', 'warn'); return; }
  }
  _orderDraft.warehouseId = document.getElementById('fld-warehouse').value || null;
  if (!isSales && !_orderDraft.warehouseId) { DMS.toast('采购订单必须选择入库仓库', 'warn'); return; }
  _orderDraft.remark = document.getElementById('fld-remark').value || '';
  if (!_orderDraft.lines.length) { DMS.toast('请添加至少一行明细', 'warn'); return; }
  for (var i = 0; i < _orderDraft.lines.length; i++) {
    var l = _orderDraft.lines[i];
    if (!l.productId || !l.qty) { DMS.toast('第 ' + (i+1) + ' 行未选产品或数量为 0', 'warn'); return; }
  }

  var body;
  if (isSales) {
    // v3.4.9 修复：后端 OrderCreateRequest 是平铺结构
    body = {
      orderType: orderType,
      dealerId: _orderDraft.dealerId,
      shipAddressId: null,
      remark: _orderDraft.remark,
      lines: _orderDraft.lines.map(function(l){
        return { productId: l.productId, qty: l.qty, unitPrice: l.unitPrice };
      })
    };
  } else {
    // 采购订单同样平铺
    body = {
      supplierId: _orderDraft.supplierId,
      supplierName: _orderDraft.supplierName || '',
      warehouseId: _orderDraft.warehouseId ? Number(_orderDraft.warehouseId) : null,
      remark: _orderDraft.remark,
      lines: _orderDraft.lines.map(function(l){
        return { productId: l.productId, qty: l.qty, unitPrice: l.unitPrice };
      })
    };
  }

  DMS.api(m.api, { method: 'POST', body: body }).then(function(d){
    if (d.code === 0) {
      DMS.toast('订单创建成功', 'success');
      _orderDraft = null;
      _backToListTab(menuKey, true);
    } else {
      DMS.toast('创建失败：' + d.message, 'error');
    }
  });
}

function _switchMoveMethod(k){ _moveDraft.method = k; _renderStockMoveCreatePage(MENU_INDEX['stock-moves']); }

  if (_moveDraft.method === 'forward') {
    area.innerHTML =
      '<div class="dms-form-grid">' +
        '<div class="dms-form-item"><label>源仓库</label><select id="fwWh"><option value="">选择源仓库</option></select></div>' +
        '<div class="dms-form-item"><label>产品</label><select id="fwProd"><option value="">先选源仓库</option></select></div>' +
      '</div><div id="fwLots" style="margin-top:8px;color:#888;">选择仓库与产品后列出可用批次/序列号</div>';
    DMS.api('/api/lookups/warehouses?limit=500').then(function(r){
      if (r.code!==0) return; var s=document.getElementById('fwWh');
      (r.data||[]).forEach(function(w){ s.innerHTML+='<option value="'+w.id+'">'+(w.code?w.code+' · ':'')+w.name+'</option>'; });
    });
    DMS.api('/api/lookups/products?limit=500').then(function(r){
      if (r.code!==0) return; var s=document.getElementById('fwProd');
      (r.data||[]).forEach(function(p){ s.innerHTML+='<option value="'+p.id+'">'+p.label+'</option>'; });
    });
    var reload = function(){
      var wh=document.getElementById('fwWh').value, pid=document.getElementById('fwProd').value;
      if (!wh || !pid) return;
      DMS.api('/api/inventory/available-lots?productId='+pid+'&warehouseId='+wh+'&status='+_moveDraft.stockStatus).then(function(r){
        var box=document.getElementById('fwLots');
        if (r.code!==0 || !(r.data||[]).length){ box.innerHTML='<span style="color:#c00;">该仓库该产品无可用库存</span>'; return; }
        box.innerHTML = _lotTable(r.data, wh);
      });
    };
    document.getElementById('fwWh').addEventListener('change', reload);
    document.getElementById('fwProd').addEventListener('change', reload);
  } else if (_moveDraft.method === 'search') {
    area.innerHTML =
      '<div class="dms-form-grid">' +
        '<div class="dms-form-item"><label>批次号</label><input id="sBatch" placeholder="批次号模糊"></div>' +
        '<div class="dms-form-item"><label>序列号</label><input id="sSerial" placeholder="序列号模糊"></div>' +
        '<div class="dms-form-item"><label>物料关键字</label><input id="sKw" placeholder="产品编码/名称"></div>' +
      '</div>' +
      '<div style="margin:8px 0;"><button class="dms-btn dms-btn-primary dms-btn-sm" onclick="_moveSearch()">🔎 搜索所有仓库库存</button></div>' +
      '<div id="sResult" style="color:#888;">输入条件后搜索，将列出各仓库该批次/序列号/物料的库存供多选</div>';
  } else {
    area.innerHTML =
      '<div class="dms-form-grid">' +
        '<div class="dms-form-item" style="grid-column:1/-1;"><label>关联收货入库单</label><select id="rcSel"><option value="">选择已入库的收货单</option></select></div>' +
      '</div><div id="rcResult" style="margin-top:8px;color:#888;">选择收货单后带出其已入库明细</div>';
    DMS.api('/api/receipts?page=1&size=200').then(function(r){
      var d = r.data && r.data.list ? r.data.list : [];
      var sel = document.getElementById('rcSel');
      d.forEach(function(x){

        if (st.indexOf('RECEIVED')>=0 || st==='COMPLETED' || st.indexOf('PARTIAL')>=0) {
          sel.innerHTML += '<option value="'+x.id+'">'+x.code+' · '+(x.warehouseName||'')+' · '+st+'</option>';
        }

    });

function _lotTable(lots, whId){
  var h = '<table class="dms-table" style="width:100%;font-size:13px;"><thead><tr>' +
    '<th style="width:36px;"></th><th>产品</th><th>批次/序列号</th><th>仓库</th><th>库存状态</th><th>可用</th><th>移动数量</th></tr></thead><tbody>';
  lots.forEach(function(l, i){
    var lotId = (l.warehouseId||whId||'')+'|'+(l.batchNo||'')+'|'+(l.serialNo||'')+'|'+(l.productId||'');
    var maxQty = Number(l.qty||0);
    var isSerial = !!l.serialNo;
    h += '<tr>' +
      '<td><input type="checkbox" class="mvLot" data-lot="'+encodeURIComponent(JSON.stringify({fromWarehouseId:Number(l.warehouseId||whId),productId:Number(l.productId||0),batchNo:l.batchNo||"",serialNo:l.serialNo||"",max:maxQty,productName:l.productName||"",warehouseName:l.warehouseName||""}))+'"></td>' +
      '<td>'+(l.productName||('#'+(l.productId||'')))+'</td>' +
      '<td>'+(l.serialNo?('SN: '+l.serialNo):('批次: '+(l.batchNo||'-')))+'</td>' +
      '<td>'+(l.warehouseName||('#'+(l.warehouseId||whId||'')))+'</td>' +
      '<td>'+(l.stockStatus||'')+'</td>' +
      '<td>'+maxQty+'</td>' +
      '<td><input type="number" class="mvQty" min="0" max="'+maxQty+'" value="'+(isSerial?1:maxQty)+'" style="width:80px;"'+(isSerial?' readonly':'')+'></td>' +
      '</tr>';
  });
  h += '</tbody></table><div style="margin-top:8px;"><button class="dms-btn dms-btn-sm dms-btn-primary" onclick="_addCheckedLots()">➕ 加入待移动明细</button></div>';
  return h;
}

function _addCheckedLots(){
  var cbs = document.querySelectorAll('.mvLot:checked');
  if (!cbs.length){ DMS.toast('请勾选至少一条库存', 'warn'); return; }
  cbs.forEach(function(cb){
    var info = JSON.parse(decodeURIComponent(cb.getAttribute('data-lot')));
    var tr = cb.closest('tr');
    var qty = Number(tr.querySelector('.mvQty').value || 0);
    if (qty <= 0) return;
    if (qty > info.max) { DMS.toast(info.productName+' 移动数量超过可用', 'warn'); return; }
    _moveDraft.lines.push({ fromWarehouseId: info.fromWarehouseId, productId: info.productId,
      batchNo: info.batchNo, serialNo: info.serialNo, qty: qty,
      productName: info.productName, fromWarehouseName: info.warehouseName });
  });
  _renderMoveLines();
  DMS.toast('已加入明细', 'success');
}

function _moveSearch(){
  var b=document.getElementById('sBatch').value, s=document.getElementById('sSerial').value, k=document.getElementById('sKw').value;
  var qs = 'size=200&stockStatus='+_moveDraft.stockStatus;
  if (b) qs+='&batchNo='+encodeURIComponent(b);
  if (s) qs+='&serialNo='+encodeURIComponent(s);
  if (k) qs+='&keyword='+encodeURIComponent(k);
  DMS.api('/api/inventory?'+qs).then(function(r){
    var box=document.getElementById('sResult');
    var d = r.data && r.data.list ? r.data.list : [];
    if (!d.length){ box.innerHTML='<span style="color:#c00;">无匹配库存</span>'; return; }
    box.innerHTML = _lotTable(d, null);
  });
}

function _moveLoadReceipt(id){
  DMS.api('/api/receipts/'+id+'/detail').then(function(r){
    if (r.code!==0){ DMS.toast('加载失败', 'error'); return; }
    var head = r.data || {};
    var lines = head.lines || [];
    var box=document.getElementById('rcResult');
    if (!lines.length){ box.innerHTML='<span style="color:#c00;">该收货单无已入库明细</span>'; return; }
    var wh = head.warehouseId; var whName = head.warehouseName||'';
    var h = '<table class="dms-table" style="width:100%;font-size:13px;"><thead><tr><th style="width:36px;"></th><th>产品</th><th>批次/序列号</th><th>入库数量</th><th>移动数量</th></tr></thead><tbody>';
    lines.forEach(function(l){
      var q = Number(l.receivedQty||l.qty||0);
      var info = {fromWarehouseId:Number(wh),productId:Number(l.productId||0),batchNo:l.batchNo||"",serialNo:l.serialNo||"",max:q,productName:l.productName||"",warehouseName:whName};
      h += '<tr><td><input type="checkbox" class="mvLot" data-lot="'+encodeURIComponent(JSON.stringify(info))+'"></td>' +
        '<td>'+(l.productName||('#'+l.productId))+'</td>' +
        '<td>'+(l.serialNo?('SN: '+l.serialNo):('批次: '+(l.batchNo||'-')))+'</td>' +
        '<td>'+q+'</td>' +
        '<td><input type="number" class="mvQty" min="0" max="'+q+'" value="'+q+'" style="width:80px;"'+(l.serialNo?' readonly':'')+'></td></tr>';
    });
    h += '</tbody></table><div style="margin-top:8px;"><button class="dms-btn dms-btn-sm dms-btn-primary" onclick="_addCheckedLots()">➕ 加入待移动明细</button></div>';
    box.innerHTML = h;
  });
}

function _renderMoveLines(){
  var box = document.getElementById('mvLines');
  if (!box) return;
  if (!_moveDraft.lines.length){ box.innerHTML = '<div style="color:#999;padding:8px;">尚未添加明细</div>'; return; }
  var h = '<table class="dms-table" style="width:100%;font-size:13px;"><thead><tr><th>产品</th><th>批次/序列号</th><th>源仓库</th><th>数量</th><th>操作</th></tr></thead><tbody>';
  _moveDraft.lines.forEach(function(l, i){
    h += '<tr><td>'+(l.productName||('#'+l.productId))+'</td>' +
      '<td>'+(l.serialNo?('SN: '+l.serialNo):('批次: '+(l.batchNo||'-')))+'</td>' +
      '<td>'+(l.fromWarehouseName||('#'+l.fromWarehouseId))+'</td>' +
      '<td>'+l.qty+'</td>' +
      '<td><button class="dms-btn dms-btn-sm" onclick="_delMoveLine('+i+')">删除</button></td></tr>';
  });
  h += '</tbody></table>';
  box.innerHTML = h;
}
function _delMoveLine(i){ _moveDraft.lines.splice(i,1); _renderMoveLines(); }
function _clearMoveLines(){ _moveDraft.lines = []; _renderMoveLines(); }

function _submitMove(menuKey){
  var to = document.getElementById('mvTo').value;
  if (!to){ DMS.toast('请选择目标仓库', 'warn'); return; }
  if (!_moveDraft.lines.length){ DMS.toast('请添加至少一条移动明细', 'warn'); return; }
  // 校验：源仓库不能等于目标仓库
  var toId = Number(to);
  var groups = {};
  for (var i=0;i<_moveDraft.lines.length;i++){
    var l=_moveDraft.lines[i];
    if (Number(l.fromWarehouseId)===toId){ DMS.toast('第'+(i+1)+'行源仓库与目标仓库相同', 'warn'); return; }
    (groups[l.fromWarehouseId]=groups[l.fromWarehouseId]||[]).push(l);
  }
  // 每个源仓库生成一张移动单
  var srcIds = Object.keys(groups);
  var done = 0, failed = 0;
  srcIds.forEach(function(src){
    var body = { fromWarehouseId: Number(src), toWarehouseId: toId, stockStatus: _moveDraft.stockStatus,
      remark: _moveDraft.remark, lines: groups[src].map(function(l){ return { productId:l.productId, batchNo:l.batchNo, serialNo:l.serialNo, qty:l.qty }; }) };
    DMS.api(MENU_INDEX[menuKey].api, { method:'POST', body: body }).then(function(d){
      if (d.code===0) done++; else { failed++; DMS.toast('部分失败：'+d.message, 'error'); }
      if (done+failed===srcIds.length){
        if (failed===0){ DMS.toast('库存移动成功（'+done+'单）', 'success'); _moveDraft=null; _backToListTab(menuKey, true); }
      }
    });
  });
}

  // 通用字段映射
  var fieldGroups = {

    'dealerId':'基本信息','supplierId':'基本信息','warehouseId':'基本信息','productId':'基本信息',
    'terminalId':'基本信息','hospitalId':'基本信息','categoryId':'基本信息','regionId':'基本信息',
    'amountInclTax':'金额','discountAmount':'金额','finalAmount':'金额','taxAmount':'金额',
    'currentPrice':'金额','price':'金额','taxRate':'金额','qty':'金额',
    'createdAt':'时间','updatedAt':'时间','expectedDate':'时间','submittedAt':'时间',
    'approvedAt':'时间','completedAt':'时间','arrivedAt':'时间','salesDate':'时间',
    'validFrom':'时间','validTo':'时间','issueDate':'时间',
    'status':'状态','gspStatus':'状态'
  };

  Object.keys(data || {}).forEach(function(k){
    if (k === 'lines' || k === 'extra' || k === 'allowedActions') return;
    var g = fieldGroups[k] || '其它';
    groups[g].push({ key: k, value: data[k] });
  });

  var h = '';

  // 顶部：单号+状态+关键操作
  h += '<div style="padding:16px 20px;background:linear-gradient(135deg,#2C4B8E,#1E3A5F);color:#fff;border-radius:6px;margin-bottom:16px;">' +

       '<div style="font-size:20px;font-weight:700;margin:4px 0;">' + (data.code || ('#' + data.id)) + '</div>' +

       (data.status ? '<span style="background:rgba(255,255,255,.2);padding:3px 10px;border-radius:10px;">' + statusChinese(data.status) + '</span>' : '') +
       (data.createdAt ? '<span>创建时间：' + String(data.createdAt).substring(0,19) + '</span>' : '') +
       '</div></div>';

  // 分组字段
  ['基本信息','金额','时间','状态','其它'].forEach(function(gname){
    var items = groups[gname];
    if (!items.length) return;
    h += '<div style="margin-bottom:14px;">' +
         '<div style="font-size:13px;font-weight:600;color:#2C4B8E;padding:6px 12px;background:#e6f4ff;border-left:3px solid #2C4B8E;margin-bottom:8px;">' + gname + '</div>' +
         '<table style="width:100%;border-collapse:collapse;">';
    items.forEach(function(it){
      var label = DMS.labelOf(it.key);
      var val = it.value;
      var display;
      if (val == null || val === '') display = '<span style="color:#bbb;">-</span>';
      else if (it.key === 'status') display = DMS.statusBadge(val);
      else if (typeof val === 'boolean') display = val ? '✅ 是' : '否';
      else if (typeof val === 'number' && (it.key.indexOf('mount')>0 || it.key.indexOf('Price')>0)) display = '<span style="color:#f5222d;font-weight:600;">¥ ' + Number(val).toFixed(2) + '</span>';
      else if (typeof val === 'object') display = '<code style="font-size:11px;">' + JSON.stringify(val) + '</code>';
      else display = String(val).replace(/T/,' ').substring(0,50);
      h += '<tr style="border-bottom:1px solid #f5f5f5;">' +
           '<td style="padding:8px 12px;width:140px;color:#999;font-size:12px;">' + label + '</td>' +
           '<td style="padding:8px 12px;font-size:13px;">' + display + '</td></tr>';
    });
    h += '</table></div>';
  });

  // 明细子表（如果有）
  if (data.lines && data.lines.length) {
    h += '<div style="margin-bottom:14px;">' +
         '<div style="font-size:13px;font-weight:600;color:#2C4B8E;padding:6px 12px;background:#e6f4ff;border-left:3px solid #2C4B8E;margin-bottom:8px;">📋 明细（' + data.lines.length + ' 项）</div>' +
         '<table style="width:100%;border-collapse:collapse;font-size:12px;">' +
         '<thead><tr style="background:#fafbfc;">' +
         '<th style="padding:8px;text-align:left;">#</th>' +
         '<th style="padding:8px;text-align:left;">产品</th>' +
         '<th style="padding:8px;text-align:left;">数量</th>' +
         '<th style="padding:8px;text-align:left;">单价</th>' +
         '<th style="padding:8px;text-align:left;">税率</th>' +
         '<th style="padding:8px;text-align:left;">小计</th></tr></thead><tbody>';
    data.lines.forEach(function(l, i){
      h += '<tr style="border-bottom:1px solid #f5f5f5;">' +
           '<td style="padding:8px;">' + (i+1) + '</td>' +
           '<td style="padding:8px;"><div style="font-weight:600;color:#2C4B8E;">' + (l.productCode || l.code || ('#' + l.productId)) + '</div>' +
             '<div style="color:#666;font-size:11px;">' + (l.productName || '-') + (l.productSpec ? ' · ' + l.productSpec : '') + '</div></td>' +
           '<td style="padding:8px;">' + (l.qty || 0) + (l.receivedQty != null ? '<div style="color:#52c41a;font-size:10px;">已收 ' + l.receivedQty + '</div>' : '') + '</td>' +
           '<td style="padding:8px;">¥ ' + Number(l.unitPrice||0).toFixed(2) + '</td>' +

           '</tr>';
    });
    h += '</tbody></table></div>';
  }

  // v3.4.11 操作日志时间轴（异步加载）
  var logResourceType = _detailResourceType(menu.key);
  if (logResourceType && data.id) {
    h += '<div style="margin-bottom:14px;">' +
         '<div style="font-size:13px;font-weight:600;color:#2C4B8E;padding:6px 12px;background:#e6f4ff;border-left:3px solid #2C4B8E;margin-bottom:8px;">🕓 操作记录</div>' +

             a.label + '</button>';
    }).join(' ');

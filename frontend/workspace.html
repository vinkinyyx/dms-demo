  setTimeout(function(){ mask.classList.add('show'); }, 10);
  var close = function(){ mask.classList.remove('show'); setTimeout(function(){ mask.remove(); }, 200); };
  box.querySelector('.dms-modal-close').onclick = close;
  box.querySelector('.dms-btn-cancel').onclick = close;
  mask.onclick = function(e){ if(e.target===mask) close(); };

  // v3.4.11 异步拉取操作日志
  if (logResourceType && data.id) {
    DMS.api('/api/operation-logs?resourceType=' + logResourceType + '&resourceId=' + data.id).then(function(r){
      var boxEl = document.getElementById('opLogBox');
      if (!boxEl) return;
      if (r.code !== 0 || !r.data || !r.data.length) {
        boxEl.innerHTML = '<span style="color:#bbb;font-size:12px;">暂无操作记录</span>';
        return;
      }
      var html = '<div style="border-left:2px solid #e6f4ff;margin-left:6px;">';
      r.data.forEach(function(log){
        var note = '';
        try { note = log.detail && log.detail.note ? log.detail.note : ''; } catch(e){}
        html += '<div style="position:relative;padding:6px 0 6px 18px;">' +
          '<span style="position:absolute;left:-5px;top:10px;width:8px;height:8px;border-radius:50%;background:#2C4B8E;"></span>' +
          '<div style="font-size:13px;font-weight:600;color:#333;">' + (log.actionLabel || log.action) + '</div>' +
          '<div style="font-size:11px;color:#999;">' + (log.userName || '系统') + ' · ' + String(log.atTime).replace('T',' ').substring(0,19) + '</div>' +
          (note ? '<div style="font-size:11px;color:#666;margin-top:2px;">' + note + '</div>' : '') +
          '</div>';
      });
      html += '</div>';
      boxEl.innerHTML = html;
    });
  }
}

// v3.4.11 菜单 key → 操作日志 resourceType
function _detailResourceType(menuKey){
  var map = {
    'orders':'order', 'sales-returns':'order',
    'purchase-orders':'purchase_order', 'purchase-returns':'purchase_order',
    'receipts':'receipt', 'sales-outs':'sales_out',
    'products':'product', 'dealers':'dealer', 'hospitals':'hospital',
    'warehouses':'warehouse', 'suppliers':'supplier', 'product-prices':'product_price',
    'inventory-adjustments':'inventory_adjustment', 'stock-moves':'stock_move'
  };
  return map[menuKey] || null;
}

function statusChinese(s){
  var map = {
    'DRAFT':'草稿','SUBMITTED':'已提交','APPROVED':'已审批','REJECTED':'已驳回',
    'CANCELLED':'已取消','COMPLETED':'已完成','RECEIVING':'收货中','SHIPPED':'已发货',
    'active':'启用','inactive':'停用','locked':'锁定'
  };
  return map[s] || map[String(s).toUpperCase()] || s;
}

// ============ 状态驱动按钮 - 根据订单状态获取允许的操作 ============
function actionsForStatus(menu, status){
  // 自定义 statusActions 字典（v3.4.4 新增）
  if (menu.statusActions) {
    var st = String(status||'').toUpperCase();
    return menu.statusActions[st] || [];
  }
  // 采购订单状态机
  if (menu.purchaseOrder) {
    switch (String(status||'').toUpperCase()) {
      case 'DRAFT':
        return [
          {key:'edit',    label:'编辑',     type:'primary', method:'GET',  path:''},
          {key:'submit',  label:'提交审批', type:'warn',    method:'POST', path:'/submit', confirm:'确认提交采购单？'},
          {key:'cancel',  label:'取消',     type:'danger',  method:'POST', path:'/cancel', confirm:'确认取消？'}
        ];
      case 'SUBMITTED':
        return [
          {key:'approve', label:'审批通过', type:'success', method:'POST', path:'/approve', confirm:'审批通过？将自动创建收货入库单。'},
          {key:'reject',  label:'驳回',     type:'danger',  method:'POST', path:'/reject',  confirm:'确认驳回？'},
          {key:'cancel',  label:'取消',     type:'default', method:'POST', path:'/cancel'}
        ];
      case 'APPROVED':
        // v3.4.8 移除收货入库按钮：审批后自动生成 RK 草稿，去"收货入库"页操作
        return [];
      case 'RECEIVING':
        return [];
      default:
        return [];
    }
  }
  // 销售订单状态机
  if (menu.salesOrder) {
    switch (String(status||'').toUpperCase()) {
      case 'DRAFT':
        return [
          {key:'edit',    label:'编辑',     type:'primary', method:'GET',  path:''},
          {key:'submit',  label:'提交审批', type:'warn',    method:'POST', path:'/submit', confirm:'确认提交订单？'},
          {key:'cancel',  label:'取消',     type:'danger',  method:'POST', path:'/cancel', confirm:'确认取消订单？'}
        ];
      case 'SUBMITTED':
        return [
          {key:'approve', label:'审批通过', type:'success', method:'POST', path:'/approve', confirm:'审批通过？'},
          {key:'reject',  label:'驳回',     type:'danger',  method:'POST', path:'/reject',  confirm:'确认驳回订单？'},
          {key:'cancel',  label:'取消',     type:'default', method:'POST', path:'/cancel'}
        ];
      default:
        return [];
    }
  }
  return [];
}

// 状态动作执行
function doStatusAction(id, key, method, path, confirmMsg){
  var m = currentList.menu;
  if (key === 'edit') { doEdit(id); return; }
  // 需要弹窗填批次/序列号（销售出库执行 & 收货入库执行）
  if (m.statusActions) {
    var st = null;
    var actions = [];
    Object.keys(m.statusActions).forEach(function(k){
      m.statusActions[k].forEach(function(a){ if(a.key===key) { st=k; actions.push(a); }});
    });
    if (actions.length && actions[0].needsLots) {
      // v3.4.8：走 Tab 内批次录入子页
      openLotFillTab(m, id, actions[0], path, method);
      return;
    }
  }
  DMS.confirm(confirmMsg || '确认执行？', function(){
    DMS.api(m.api + '/' + id + path, {method: method || 'POST'}).then(function(d){
      if (d.code === 0) { DMS.toast('操作成功', 'success'); reloadList(); }
      else DMS.toast('失败：' + d.message, 'error');
    });
  });
}

// v3.4.8 批次/序列号 Tab 子页（销售出库/收货入库执行时使用）
function openLotFillTab(menu, docId, action, path, method) {
  _saveActiveTabSnapshot();
  var tab = {
    id: ++_tabIdSeq,
    key: menu.key,
    label: menu.label + ' - 执行 #' + docId,
    icon: '⚡',
    filter: { __mode: 'execute', __id: docId, __ts: Date.now() },
    pinned: false
  };
  _tabs.push(tab);
  _activeTabId = tab.id;
  _renderTabsBar();
  document.getElementById('crumb').innerHTML = '首页 / <strong>' + tab.label + '</strong>';
  _renderLotFillPage(menu, docId, action, path, method);
}

function _renderLotFillPage(menu, docId, action, path, method) {
  var content = document.getElementById('content');
  content.innerHTML =
    '<div class="dms-page-title">' + action.label + ' - ' + menu.label + ' #' + docId + '</div>' +
    '<div class="dms-page-sub"><a class="dms-link" onclick="_backToListTab(\''+menu.key+'\')">← 返回列表</a></div>' +
    '<div class="dms-card"><div id="lotFillBody"><div class="dms-loading">加载中...</div></div></div>';

  DMS.api(menu.api + '/' + docId + '/detail').then(function(d){
    if (d.code !== 0) {
      document.getElementById('lotFillBody').innerHTML = '<div class="dms-error-hint">' + d.message + '</div>';
      return;
    }
    var head = d.data || {};
    var lines = head.lines || [];
    var isReceipt = action.isReceipt === true;
    var lineIdKey = isReceipt ? 'receiptLineId' : 'salesOutLineId';
    var whId = head.warehouseId;

    var rowsHtml = lines.map(function(l){
      var isSerial = l.isSerialManaged;
      var expected = (l.qty != null) ? l.qty : (l.expectedQty || 0);
      var already = isReceipt ? (l.receivedQty || 0) : (l.shippedQty || 0);
      var remaining = Number(expected) - Number(already);
      // v3.4.12: 序列号产品用"逐个录入/选择"多行维护；批次产品单行
      var serialCell, batchCell, thisQtyCell, opCell;
      if (isSerial) {
        thisQtyCell = '<td><span class="dms-serial-count" style="font-weight:600;">0</span> / ' + remaining + '</td>';
        serialCell = '<td colspan="2"><div class="dms-serial-list" style="display:flex;flex-wrap:wrap;gap:4px;font-size:12px;color:#666;">（未录入）</div></td>';
        if (isReceipt) {
          opCell = '<td><button type="button" class="dms-btn dms-btn-sm dms-serial-input" data-lineid="' + l.id + '" data-remaining="' + remaining + '">✏️ 逐个录入</button></td>';
        } else {
          opCell = '<td><button type="button" class="dms-btn dms-btn-sm dms-serial-pick" data-lineid="' + l.id + '" data-pid="' + l.productId + '" data-wh="' + (whId||'') + '" data-remaining="' + remaining + '">📋 选序列号</button></td>';
        }
        return '<tr data-lineid="' + l.id + '" data-serial="1" data-remaining="' + remaining + '" data-serials="">' +
          '<td>' + (l.productCode||'') + ' · ' + (l.productName||'') + '</td>' +
          '<td>' + expected + '</td>' +
          '<td style="color:#999;">' + already + '</td>' +
          thisQtyCell +
          '<td><span class="dms-badge dms-badge-blue">序列号</span></td>' +
          serialCell + opCell + '</tr>';
      } else {
        var lotBtn = isReceipt ? '' :
          '<button type="button" class="dms-btn dms-btn-sm dms-lot-pick" data-lineid="' + l.id + '" data-pid="' + l.productId + '" data-wh="' + (whId||'') + '" data-serial="0">📋 选择</button>';
        return '<tr data-lineid="' + l.id + '" data-serial="0" data-remaining="' + remaining + '">' +
          '<td>' + (l.productCode||'') + ' · ' + (l.productName||'') + '</td>' +
          '<td>' + expected + '</td>' +
          '<td style="color:#999;">' + already + '</td>' +
          '<td><input type="number" class="dms-this-qty" min="0" max="' + remaining + '" value="' + remaining + '" style="width:80px;padding:4px 6px;"></td>' +
          '<td><span class="dms-badge dms-badge-gray">批次</span></td>' +
          '<td><input type="text" class="dms-lot-input" data-k="batchNo" value="' + (l.batchNo||'') + '" placeholder="' + (isReceipt?'批次号':'点击右侧选择') + '"' + (isReceipt?'':' readonly') + ' style="width:100%;padding:4px 6px;' + (isReceipt?'':'background:#f5f5f5;cursor:not-allowed;') + '"></td>' +
          '<td><input type="text" class="dms-lot-input" data-k="serialNo" value="" placeholder="-" disabled style="width:100%;padding:4px 6px;"></td>' +
          '<td>' + lotBtn + '</td>' +
          '</tr>';
      }
    }).join('');

    document.getElementById('lotFillBody').innerHTML =
      '<div style="margin-bottom:8px;color:var(--md-on-surface-variant);font-size:12px;">' +
        '单号: <strong>' + (head.code||'-') + '</strong> · ' +
        (isReceipt ? '仓库' : '经销商') + ': ' + (head.warehouseName || head.dealerName || '-') +
        (head.sourceOrderCode ? ' · 来源销售单: <strong style="color:var(--md-primary);">' + head.sourceOrderCode + '</strong>' : '') +
        (head.sourcePoCode ? ' · 来源采购单: <strong style="color:var(--md-primary);">' + head.sourcePoCode + '</strong>' : '') +
        (head.status ? ' · 状态: <span class="dms-badge dms-badge-' + (head.status==='COMPLETED'?'green':head.status.indexOf('PARTIAL')>=0?'orange':'gray') + '">' + head.status + '</span>' : '') +
      '</div>' +
      (isReceipt
        ? '<div class="dms-info-hint" style="margin-bottom:12px;padding:8px 12px;background:#e6f7ff;border-left:3px solid #1890ff;font-size:12px;">💡 收货入库：<strong>可修改"本次收货量"</strong>实现部分收货；批次号/序列号必填。剩余部分可再次执行或取消。</div>'
        : '<div class="dms-info-hint" style="margin-bottom:12px;padding:8px 12px;background:#fffbe6;border-left:3px solid #faad14;font-size:12px;">💡 销售出库：<strong>可修改"本次发货量"</strong>实现部分发货；点【选择】按仓库合格库存挑批次/序列号。</div>'
      ) +
      '<table><thead><tr>' +
        '<th>产品</th><th style="width:70px;">应' + (isReceipt?'收':'发') + '</th><th style="width:70px;">已' + (isReceipt?'收':'发') + '</th><th style="width:100px;">本次量</th><th style="width:80px;">类型</th>' +
        '<th style="width:150px;">批次号</th><th style="width:150px;">序列号</th>' +
        '<th style="width:80px;">操作</th>' +
      '</tr></thead><tbody>' + rowsHtml + '</tbody></table>' +
      '<div style="margin-top:16px;text-align:right;">' +
        '<button class="dms-btn dms-btn-danger" onclick="_cancelDoc(\''+menu.key+'\','+docId+')">✖ 取消剩余</button> ' +
        '<button class="dms-btn" onclick="_backToListTab(\''+menu.key+'\')">返回</button> ' +
        '<button class="dms-btn dms-btn-primary" id="lotSubmitBtn">' + action.label + '</button>' +
      '</div>';

    // v3.4.13: 序列号批量录入（收货，多行文本框一次性粘贴一批）
    document.querySelectorAll('.dms-serial-input').forEach(function(btn){
      btn.onclick = function(){
        var lineId = btn.getAttribute('data-lineid');
        var remaining = Number(btn.getAttribute('data-remaining'));
        var tr = document.querySelector('tr[data-lineid="' + lineId + '"]');
        var cur = (tr.getAttribute('data-serials') || '').split(',').filter(Boolean);
        openSerialBatchInput(cur, remaining, function(arr){
          _setSerials(tr, arr);
        });
      };
    });

    // v3.4.12: 序列号从库存选择（出库，多选）
    document.querySelectorAll('.dms-serial-pick').forEach(function(btn){
      btn.onclick = function(){
        var pid = btn.getAttribute('data-pid');
        var wh = btn.getAttribute('data-wh');
        var lineId = btn.getAttribute('data-lineid');
        var remaining = Number(btn.getAttribute('data-remaining'));
        var url = '/api/inventory/available-lots?productId=' + pid + '&status=QUALIFIED' + (wh?('&warehouseId=' + wh):'');
        DMS.api(url).then(function(r){
          if (r.code !== 0) { DMS.toast('查询库存失败: ' + r.message, 'error'); return; }
          var lots = (r.data || []).filter(function(x){return x.serialNo;});
          if (!lots.length) { DMS.toast('该产品无合格序列号库存可选', 'warn'); return; }
          openSerialMultiPicker(lots, remaining, function(picked){
            var tr = document.querySelector('tr[data-lineid="' + lineId + '"]');
            _setSerials(tr, picked);
          });
        });
      };
    });

    // 绑定批次选择
    document.querySelectorAll('.dms-lot-pick').forEach(function(btn){
      btn.onclick = function(){
        var pid = btn.getAttribute('data-pid');
        var wh = btn.getAttribute('data-wh');
        var isSerial = btn.getAttribute('data-serial') === '1';
        var lineId = btn.getAttribute('data-lineid');
        var url = '/api/inventory/available-lots?productId=' + pid + '&status=QUALIFIED' + (wh?('&warehouseId=' + wh):'');
        DMS.api(url).then(function(r){
          if (r.code !== 0) { DMS.toast('查询库存失败: ' + r.message, 'error'); return; }
          var lots = r.data || [];
          if (!lots.length) { DMS.toast('该产品无合格库存可选', 'warn'); return; }
          openLotPicker(lots, isSerial, function(picked){
            var tr = document.querySelector('tr[data-lineid="' + lineId + '"]');
            if (isSerial) tr.querySelector('[data-k="serialNo"]').value = picked.serialNo || '';
            else tr.querySelector('[data-k="batchNo"]').value = picked.batchNo || '';
          });
        });
      };
    });

    // 提交
    document.getElementById('lotSubmitBtn').onclick = function(){
      var linesBody = [];
      var invalid = false;
      var anyThisQty = false;
      document.querySelectorAll('#lotFillBody tbody tr').forEach(function(tr){
        if (invalid) return;
        var lid = Number(tr.getAttribute('data-lineid'));
        var remaining = Number(tr.getAttribute('data-remaining') || 0);
        var isSerial = tr.getAttribute('data-serial') === '1';
        if (isSerial) {
          // v3.4.12: 序列号行 → 每个序列号拆一条 qty=1
          var serials = (tr.getAttribute('data-serials') || '').split(',').filter(Boolean);
          if (!serials.length) return; // 本次该行不处理
          if (serials.length > remaining) { DMS.toast('序列号数量超过剩余 ' + remaining, 'warn'); invalid = true; return; }
          anyThisQty = true;
          serials.forEach(function(sn){
            var line = {}; line[lineIdKey] = lid; line.qty = 1; line.serialNo = sn;
            linesBody.push(line);
          });
        } else {
          var b = tr.querySelector('[data-k="batchNo"]').value.trim();
          var thisQty = Number(tr.querySelector('.dms-this-qty').value || 0);
          if (thisQty > remaining) { DMS.toast('本次量不能超过剩余 ' + remaining, 'warn'); invalid = true; return; }
          if (thisQty <= 0) { return; }
          anyThisQty = true;
          if (!b) { DMS.toast('批次产品必须填批次号', 'warn'); invalid = true; return; }
          var line = {}; line[lineIdKey] = lid; line.qty = thisQty; line.batchNo = b;
          linesBody.push(line);
        }
      });
      if (invalid) return;
      if (!anyThisQty) { DMS.toast('本次未填任何数量', 'warn'); return; }
      DMS.api(menu.api + '/' + docId + path, {
        method: method || 'POST',
        body: { lines: linesBody }
      }).then(function(rr){
        if (rr.code === 0) {
          var st = rr.data && rr.data.status;
          DMS.toast(rr.data && rr.data.message ? rr.data.message : '操作成功', 'success');
          if (st && st.indexOf('PARTIAL') >= 0) {
            _renderLotFillPage(menu, docId, action, path, method);
          } else {
            _backToListTab(menu.key, true);
          }
        } else {
          DMS.toast('失败：' + rr.message, 'error');
        }
      });
    };
  });
}

// v3.4.12 设置序列号行的已录入列表（更新 UI + data-serials）
function _setSerials(tr, serials) {
  tr.setAttribute('data-serials', serials.join(','));
  var cntEl = tr.querySelector('.dms-serial-count');
  if (cntEl) cntEl.textContent = serials.length;
  var listEl = tr.querySelector('.dms-serial-list');
  if (listEl) {
    listEl.innerHTML = serials.length
      ? serials.map(function(s){ return '<span style="background:#e6f4ff;border:1px solid #91caff;border-radius:3px;padding:1px 6px;">' + s + '</span>'; }).join('')
      : '（未录入）';
  }
}

// v3.4.13 序列号批量录入弹窗（收货，多行文本框，一次性粘贴一批）
function openSerialBatchInput(current, maxCount, cb) {
  var body =
    '<div style="margin-bottom:8px;font-size:12px;color:#666;">每行一个序列号，可从 Excel 直接复制粘贴（也支持逗号分隔）。最多 <strong>' + maxCount + '</strong> 个。</div>' +
    '<textarea id="serialBatchTa" rows="10" style="width:100%;font-family:monospace;font-size:13px;padding:8px;border:1px solid var(--md-outline);border-radius:6px;" placeholder="SN0001&#10;SN0002&#10;SN0003">' + (current||[]).join('\n') + '</textarea>' +
    '<div id="serialBatchCnt" style="margin-top:6px;font-size:12px;color:#999;">已录入 0 个</div>';
  DMS.confirm(body, function(){
    var ta = document.getElementById('serialBatchTa');
    var arr = ta.value.split(/[\n,，;；\s]+/).map(function(s){return s.trim();}).filter(Boolean);
    if (!arr.length) { DMS.toast('请至少录入一个序列号', 'warn'); return false; }
    if (arr.length > maxCount) { DMS.toast('最多录入 ' + maxCount + ' 个序列号', 'warn'); return false; }
    var dup = arr.filter(function(x,i){return arr.indexOf(x)!==i;});
    if (dup.length) { DMS.toast('序列号重复：' + dup[0], 'warn'); return false; }
    cb(arr);
  }, '批量录入序列号');
  setTimeout(function(){
    var ta = document.getElementById('serialBatchTa');
    var cntEl = document.getElementById('serialBatchCnt');
    if (!ta) return;
    function upd(){
      var n = ta.value.split(/[\n,，;；\s]+/).map(function(s){return s.trim();}).filter(Boolean).length;
      if (cntEl) cntEl.innerHTML = '已录入 <strong style="color:' + (n>maxCount?'#e74c3c':'#27ae60') + ';">' + n + '</strong> 个' + (n>maxCount?('（超过上限 '+maxCount+'）'):'');
    }
    ta.addEventListener('input', upd);
    upd(); ta.focus();
  }, 50);
}

// v3.4.12 序列号多选弹窗（出库从库存挑选）
function openSerialMultiPicker(lots, maxCount, cb) {
  var listHtml = '<div style="max-height:360px;overflow-y:auto;border:1px solid var(--md-outline-variant);border-radius:6px;">';
  lots.forEach(function(l){
    listHtml += '<label class="smp-item" style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--md-outline-variant);cursor:pointer;">' +
      '<input type="checkbox" class="smp-cb" value="' + l.serialNo + '">' +
      '<span><strong>' + l.serialNo + '</strong>' + (l.batchNo?(' · 批次 '+l.batchNo):'') + (l.warehouseName?(' · '+l.warehouseName):'') + '</span>' +
      '</label>';
  });
  listHtml += '</div>';
  DMS.confirm('<div style="margin-bottom:8px;font-size:12px;color:#666;">最多可选 ' + maxCount + ' 个序列号</div>' + listHtml, function(){
    var picked = [];
    document.querySelectorAll('.smp-cb:checked').forEach(function(cb){ picked.push(cb.value); });
    if (!picked.length) { DMS.toast('请至少选择一个序列号', 'warn'); return false; }
    if (picked.length > maxCount) { DMS.toast('最多选择 ' + maxCount + ' 个', 'warn'); return false; }
    cb(picked);
  }, '选择序列号');
  setTimeout(function(){
    document.querySelectorAll('.smp-cb').forEach(function(c){
      c.addEventListener('change', function(){
        var n = document.querySelectorAll('.smp-cb:checked').length;
        if (n > maxCount) { c.checked = false; DMS.toast('最多选择 ' + maxCount + ' 个', 'warn'); }
      });
    });
  }, 50);
}

// v3.4.10 取消剩余
function _cancelDoc(menuKey, docId) {
  if (!confirm('确认取消本单剩余部分？已收/已发部分保留。')) return;
  var m = MENU_INDEX[menuKey];
  DMS.api(m.api + '/' + docId + '/cancel-draft', { method: 'POST' }).then(function(r){

      DMS.toast('已取消', 'success');
      _backToListTab(menuKey, true);

    }
  });
}

// v3.4.4 新增：批次/序列号填写弹窗（销售出库/收货入库执行时使用，保留兼容）
function openLotFillModal(menu, docId, action, path, method) {
  // 先取详情拿明细
  DMS.api(menu.api + '/' + docId + '/detail').then(function(d){
    if (d.code !== 0) { DMS.toast('加载明细失败：' + d.message, 'error'); return; }
    var head = d.data || {};
    var lines = head.lines || [];
    var isReceipt = action.isReceipt === true;
    var lineIdKey = isReceipt ? 'receiptLineId' : 'salesOutLineId';
    var whId = head.warehouseId;

    var rows = lines.map(function(l, i){
      var isSerial = l.isSerialManaged;
      var pName = (l.productCode || '') + ' ' + (l.productName || '') ;
      var placeholder = isSerial ? '必填序列号(唯一)' : '必填批次号';
      var lotBtn = isReceipt ? '' :
        '<button type="button" class="dms-btn dms-btn-sm dms-lot-pick" data-lineid="' + l.id + '" data-pid="' + l.productId + '" data-wh="' + (whId||'') + '" data-serial="' + (isSerial?'1':'0') + '">📋 选择</button>';
      return '<tr data-lineid="' + l.id + '" data-serial="' + (isSerial?'1':'0') + '">' +
        '<td>' + pName + '</td>' +
        '<td>' + (l.qty!=null?l.qty:'-') + '</td>' +
        '<td>' + (isSerial ? '<span class="dms-badge dms-badge-blue">序列号</span>' : '<span class="dms-badge dms-badge-gray">批次</span>') + '</td>' +
        '<td><input type="text" class="dms-lot-input" data-k="batchNo" value="' + (l.batchNo||'') + '" placeholder="' + (isSerial?'-':placeholder) + '"' + (isSerial?' disabled':'') + '></td>' +
        '<td><input type="text" class="dms-lot-input" data-k="serialNo" value="' + (l.serialNo||'') + '" placeholder="' + (isSerial?placeholder:'-') + '"' + (isSerial?'':' disabled') + '></td>' +
        '<td>' + lotBtn + '</td>' +
        '</tr>';
    }).join('');

    var body =
      '<div style="margin-bottom:8px;color:#666;font-size:13px;">' +
        '单号: <strong>' + (head.code||'-') + '</strong> · ' +
        (isReceipt ? '仓库' : '经销商') + ': ' + (head.warehouseName || head.dealerName || '-') +
      '</div>' +
      (isReceipt
        ? '<div class="dms-info-hint" style="margin-bottom:12px;padding:8px 12px;background:#e6f7ff;border-left:3px solid #1890ff;font-size:12px;">💡 收货入库：请<strong>手工录入</strong>产品的批次号或序列号（这是唯一手填批次的场景）</div>'
        : '<div class="dms-info-hint" style="margin-bottom:12px;padding:8px 12px;background:#fffbe6;border-left:3px solid #faad14;font-size:12px;">💡 销售出库：点击 <strong>选择</strong> 从合格库存中选择要出的批次/序列号</div>'
      ) +
      '<table class="dms-lines-table"><thead><tr>' +
        '<th>产品</th><th style="width:80px;">数量</th><th style="width:100px;">类型</th>' +
        '<th style="width:180px;">批次号</th><th style="width:180px;">序列号</th>' +
        '<th style="width:100px;">操作</th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table>';

    var footer =
      '<button type="button" class="dms-btn dms-btn-cancel">取消</button>' +
      '<button type="button" class="dms-btn dms-btn-primary dms-lot-submit">' + action.label + '</button>';

    var mo = DMS._modalRaw ? DMS._modalRaw(action.label, body, footer, {width:'860px'}) : null;
    // 用简单封装：因 DMS 没暴露 modalRaw，用 form 里的 baseModal 走通用方式
    // 简化：手工创建
    var mask = document.createElement('div');
    mask.className = 'dms-modal-mask';
    var box = document.createElement('div');
    box.className = 'dms-modal-box';
    box.style.maxWidth = '900px';
    box.innerHTML =
      '<div class="dms-modal-hdr"><span>' + action.label + '</span><button class="dms-modal-close" type="button">&times;</button></div>' +
      '<div class="dms-modal-body">' + body + '</div>' +
      '<div class="dms-modal-ftr">' + footer + '</div>';
    mask.appendChild(box);
    document.body.appendChild(mask);
    setTimeout(function(){ mask.classList.add('show'); }, 10);
    function close(){ mask.classList.remove('show'); setTimeout(function(){mask.remove();},200); }
    box.querySelector('.dms-modal-close').onclick = close;
    box.querySelector('.dms-btn-cancel').onclick = close;

    // 批次选择按钮
    box.querySelectorAll('.dms-lot-pick').forEach(function(btn){
      btn.onclick = function(){
        var pid = btn.getAttribute('data-pid');
        var wh = btn.getAttribute('data-wh');
        var isSerial = btn.getAttribute('data-serial') === '1';
        var lineId = btn.getAttribute('data-lineid');
        var url = '/api/inventory/available-lots?productId=' + pid + '&status=QUALIFIED' + (wh?('&warehouseId=' + wh):'');
        DMS.api(url).then(function(r){
          if (r.code !== 0) { DMS.toast('查询库存失败: ' + r.message, 'error'); return; }
          var lots = r.data || [];
          if (!lots.length) { DMS.toast('该产品无合格库存可选', 'warn'); return; }
          openLotPicker(lots, isSerial, function(picked){
            var tr = box.querySelector('tr[data-lineid="' + lineId + '"]');
            if (isSerial) tr.querySelector('[data-k="serialNo"]').value = picked.serialNo || '';
            else tr.querySelector('[data-k="batchNo"]').value = picked.batchNo || '';
          });
        });
      };
    });

    // 提交
    box.querySelector('.dms-lot-submit').onclick = function(){
      var linesBody = [];
      box.querySelectorAll('tbody tr').forEach(function(tr){
        var lid = Number(tr.getAttribute('data-lineid'));
        var isSerial = tr.getAttribute('data-serial') === '1';
        var b = tr.querySelector('[data-k="batchNo"]').value.trim();
        var s = tr.querySelector('[data-k="serialNo"]').value.trim();
        if (isSerial && !s) { DMS.toast('序列号产品必须填序列号', 'warn'); throw 'stop'; }
        if (!isSerial && !b) { DMS.toast('批次产品必须填批次号', 'warn'); throw 'stop'; }
        var line = {};
        line[lineIdKey] = lid;
        if (b) line.batchNo = b;
        if (s) line.serialNo = s;
        linesBody.push(line);
      });
      DMS.api(menu.api + '/' + docId + path, {
        method: method || 'POST',
        body: { lines: linesBody }
      }).then(function(rr){
        if (rr.code === 0) { DMS.toast('操作成功', 'success'); close(); reloadList(); }
        else DMS.toast('失败：' + rr.message, 'error');
      });
    };
  });
}

// 批次/序列号选择弹窗（在库存中选择）
function openLotPicker(lots, isSerial, onPicked) {

function doEdit(id){
  var m = currentList.menu;
  // v3.4.7 编辑走新 Tab
  if (m.form && m.form.length > 4) {
    openFormTab(m, 'edit', id);
    return;
  }
  DMS.api(m.api + '/' + id).then(function(d){
    if (d.code !== 0) { DMS.toast('加载失败：' + d.message, 'error'); return; }
    var fields = m.form.map(function(f){
      var newF = Object.assign({}, f);
      newF.value = d.data[f.key];
      // Picker 类字段：如果关联对象也已 join，用其 label
      if (f.picker && newF.value != null) {
        newF.displayValue = '#' + newF.value;
      }
      return newF;
    });
    DMS.form({
      title: '编辑 · ' + m.label + ' #' + id,
      okText: '更新',
      fields: fields,
      onSubmit: function(data){
        return DMS.api(m.api + '/' + id, { method:'PUT', body: data }).then(function(d2){
          if (d2.code === 0) { DMS.toast('更新成功', 'success'); reloadList(); return true; }
          DMS.toast('更新失败：' + d2.message, 'error'); return false;
        });
      }
    });
  });
}

function doAction(id, actionIdx){
  var m = currentList.menu;
  var a = m.actions[actionIdx];
  DMS.confirm(a.confirm || ('确认' + a.label + '？'), function(){
    DMS.api(m.api + '/' + id + a.path, { method: a.method, body: a.body || null }).then(function(d){

    });

}

var _dashboardCharts = {};
var _dashboardFilter = { period: 'month', dealerId: '', status: '', orderType: '' };

function _dashboardFilterQuery(){
  var q = [];
  if (_dashboardFilter.period) q.push('period=' + encodeURIComponent(_dashboardFilter.period));
  if (_dashboardFilter.dealerId) q.push('dealerId=' + encodeURIComponent(_dashboardFilter.dealerId));
  if (_dashboardFilter.status) q.push('status=' + encodeURIComponent(_dashboardFilter.status));
  if (_dashboardFilter.orderType) q.push('orderType=' + encodeURIComponent(_dashboardFilter.orderType));
  return q.length ? ('?' + q.join('&')) : '';
}

function applyDashboardFilter(){
  _dashboardFilter.period = document.getElementById('flt-period').value;
  _dashboardFilter.dealerId = document.getElementById('flt-dealer').value;
  _dashboardFilter.status = document.getElementById('flt-status').value;
  _dashboardFilter.orderType = document.getElementById('flt-type').value;
  refreshDashboardData();
}

function resetDashboardFilter(){
  _dashboardFilter = { period: 'month', dealerId: '', status: '', orderType: '' };
  document.getElementById('flt-period').value = 'month';
  document.getElementById('flt-dealer').value = '';
  document.getElementById('flt-status').value = '';
  document.getElementById('flt-type').value = '';
  refreshDashboardData();
}

function refreshDashboardData(){
  var q = _dashboardFilterQuery();
  DMS.api('/api/dashboard/kpi' + q).then(function(d){
    if (d.code!==0) return;
    var k = d.data || {};
    setKpi('kpi-totalSales', fmtMoney(k.totalSales));
    setKpi('kpi-totalOrders', k.totalOrders);
    setKpi('kpi-activeDealers', k.activeDealers);
    setKpi('kpi-totalProducts', k.totalProducts);
    setKpi('kpi-qualified', fmtNum(k.qualifiedStock));
    setKpi('kpi-pending', fmtNum(k.pendingStock));
    setKpi('kpi-defective', fmtNum(k.defectiveStock));
    setKpi('kpi-totalSurgeries', k.totalSurgeries);
  });
  // v3.4.8：先释放已有 chart 实例（DOM 可能已重新渲染）
  Object.keys(_dashboardCharts).forEach(function(k){
    try { _dashboardCharts[k].dispose(); } catch(e){}
    delete _dashboardCharts[k];
  });
  loadChartTrend(q);
  loadChartInv(q);
  loadChartDealers(q);
  loadChartFunnel(q);
  loadChartHosp(q);
  loadChartActivity(q);
}

function setKpi(id, v) {
  var el = document.getElementById(id);
  if (el) el.textContent = (v == null || v === '') ? '0' : v;
}
function fmtMoney(v) {
  if (v == null) return '¥0';
  var n = Number(v);
  if (isNaN(n)) return '¥0';
  if (n >= 1e8) return '¥' + (n/1e8).toFixed(2) + '亿';
  if (n >= 1e4) return '¥' + (n/1e4).toFixed(2) + '万';
  return '¥' + n.toFixed(2);
}
function fmtNum(v) {
  if (v == null) return '0';
  var n = Number(v);
  if (isNaN(n)) return '0';
  if (n >= 1e4) return (n/1e4).toFixed(2) + '万';
  return String(Math.round(n));
}

function loadChartTrend(q){
  DMS.api('/api/dashboard/sales-trend' + (q||'')).then(function(d){
    if (d.code!==0) return;
    var data = d.data || [];
    var c = _dashboardCharts.trend = _dashboardCharts.trend || echarts.init(document.getElementById('ch-trend'));
    c.setOption({
      tooltip:{trigger:'axis'},
      grid:{left:60,right:20,top:20,bottom:30},
      xAxis:{type:'category',data:data.map(function(x){return x.month;})},
      yAxis:{type:'value'},
      series:[{type:'line',smooth:true,data:data.map(function(x){return Number(x.amount)||0;}),

// ============ 销售岗位维护 v3.4.6（左树 + 右侧面板 + 表单）============
var _posSelected = null;
var _posEditing = null;   // null = 未编辑；{} = 新建；{id,...} = 编辑
var _allDealersCache = null;
var _allUsersCache = null;

function renderPositions(){
  document.getElementById('content').innerHTML =
    '<div class="dms-page-title">👔 销售岗位维护</div>' +
    '<div class="dms-page-sub">左侧岗位树 · 右侧详情/编辑面板 · 支持挂载经销商与绑定销售账号</div>' +
    '<div style="display:grid;grid-template-columns:340px 1fr;gap:16px;">' +
      '<div class="dms-card" style="max-height:calc(100vh - 260px);overflow-y:auto;">' +
        '<div class="dms-card-title">' +
          '<span>岗位树</span>' +
          '<button class="dms-btn dms-btn-sm dms-btn-primary" onclick="posOpenCreate()">+ 新建岗位</button>' +
        '</div>' +
        '<div id="posTree"><div class="dms-loading">加载中...</div></div>' +
      '</div>' +
      '<div id="posPanel"><div class="dms-empty">👈 请从左侧选择一个岗位，或点击右上角"新建岗位"</div></div>' +
    '</div>';
  posLoadTree();
  // 预加载经销商 & 销售用户 for 面板使用
  DMS.api('/api/dealers?page=1&size=1000').then(function(r){ if(r.code===0) _allDealersCache = r.data.list||[]; });
  DMS.api('/api/users?page=1&size=1000&role=sales').then(function(r){ if(r.code===0) _allUsersCache = r.data.list||[]; });
}

function posLoadTree(){
  DMS.api('/api/sales-positions/tree').then(function(d){
    if (d.code !== 0) { document.getElementById('posTree').innerHTML = '<div class="dms-error-hint">' + d.message + '</div>'; return; }
    var tree = d.data || [];
    document.getElementById('posTree').innerHTML = tree.length ? renderPosTreeNodes(tree, 0) : '<div class="dms-empty">暂无岗位数据</div>';
    document.querySelectorAll('.pos-tree-node').forEach(function(el){
      el.onclick = function(e){
        e.stopPropagation();
        document.querySelectorAll('.pos-tree-node').forEach(function(x){x.classList.remove('active');});
        el.classList.add('active');
        var id = Number(el.getAttribute('data-id'));
        _posEditing = null;
        posShowDetail(id);
      };
    });
  });
}

function renderPosTreeNodes(nodes, depth){
  return nodes.map(function(n){
    var pad = 8 + depth * 20;
    var levelColor = ['','#1a73e8','#34a853','#f9ab00','#5f6368'][n.level] || '#5f6368';
    var boundBadge = n.boundUser ? '<span class="dms-badge dms-badge-green" style="margin-left:6px;font-size:10px;">' + n.boundUser + '</span>' : '';
    var dealerBadge = n.dealerCount > 0 ? '<span class="dms-badge dms-badge-blue" style="margin-left:4px;font-size:10px;">' + n.dealerCount + '经销商</span>' : '';
    var html = '<div class="pos-tree-node" data-id="' + n.id + '" ' +
        'style="padding:8px 8px 8px ' + pad + 'px;cursor:pointer;border-radius:8px;margin:2px 0;font-size:13px;border-left:3px solid ' + levelColor + ';">' +
      '<strong>' + n.code + '</strong> · ' + n.name + boundBadge + dealerBadge +
      '</div>';
    if (n.children && n.children.length) html += renderPosTreeNodes(n.children, depth + 1);
    return html;
  }).join('');
}

function posShowDetail(id){
  _posSelected = id;
  var panel = document.getElementById('posPanel');
  panel.innerHTML = '<div class="dms-loading">加载中...</div>';
  // 用 size=1000 避免 200 限制
  Promise.all([
    DMS.api('/api/sales-positions?page=1&size=1000'),
    DMS.api('/api/dealers?page=1&size=1000')
  ]).then(function(rs){
    var pos = ((rs[0].data && rs[0].data.list) || []).find(function(x){return x.id===id;}) || {};
    var allDealers = (rs[1].data && rs[1].data.list) || [];
    _allDealersCache = allDealers;
    var attached = allDealers.filter(function(d){return d.salesPositionId===id;});
    var levelNames = {1:'总监',2:'大区经理',3:'小区经理',4:'销售代表'};

    panel.innerHTML =
      '<div class="dms-card">' +
        '<div class="dms-card-title">' +
          '<span>📋 岗位详情：' + (pos.name||'-') + '</span>' +
          '<div class="actions">' +
            '<button class="dms-btn dms-btn-sm" onclick="posOpenEdit(' + id + ')">✏️ 编辑</button>' +
          '</div>' +
        '</div>' +
        '<table style="margin-bottom:0;">' +
          '<tr><th style="width:140px;">岗位编码</th><td>' + (pos.code||'-') + '</td></tr>' +
          '<tr><th>岗位名称</th><td>' + (pos.name||'-') + '</td></tr>' +
          '<tr><th>层级</th><td><span class="dms-badge dms-badge-blue">L' + pos.level + ' ' + (levelNames[pos.level]||'') + '</span></td></tr>' +
          '<tr><th>大区</th><td>' + (pos.region||'-') + '</td></tr>' +
          '<tr><th>状态</th><td>' + (pos.status ? DMS.statusBadge(pos.status) : '<span class="dms-badge dms-badge-green">启用</span>') + '</td></tr>' +
        '</table>' +
      '</div>' +

      '<div class="dms-card">' +
        '<div class="dms-card-title">' +
          '<span>🔗 绑定销售账号 ' + (pos.boundUser ? '<span class="dms-badge dms-badge-green" style="margin-left:8px;">' + pos.boundUser + '</span>' : '<span style="color:#999;">未绑定</span>') + '</span>' +
          '<div class="actions">' +
            '<button class="dms-btn dms-btn-sm dms-btn-primary" onclick="posOpenBindUser(' + id + ')">🔗 修改绑定</button>' +
          '</div>' +
        '</div>' +
        '<div id="posBindUserForm"></div>' +
      '</div>' +

      '<div class="dms-card">' +
        '<div class="dms-card-title">' +
          '<span>🏪 挂载经销商（' + attached.length + '）</span>' +
          '<div class="actions">' +
            '<button class="dms-btn dms-btn-sm dms-btn-success" onclick="posOpenBindDealer(' + id + ')">➕ 修改挂载</button>' +
          '</div>' +
        '</div>' +
        '<div id="posBindDealerForm">' +
          (attached.length === 0
            ? '<div class="dms-empty">该岗位尚未挂载经销商</div>'
            : '<table><thead><tr><th>编码</th><th>名称</th><th>级别</th><th>状态</th></tr></thead><tbody>' +
              attached.map(function(d){
                return '<tr><td><a class="dms-link" onclick="openTab(\'dealers\',{id:' + d.id + '},\'dealers:' + d.id + '\')">' + d.code + '</a></td><td>' + d.name + '</td><td>' + (d.level||'-') + '</td><td>' + DMS.statusBadge(d.status) + '</td></tr>';
              }).join('') +
              '</tbody></table>'
          ) +
        '</div>' +
      '</div>';
  });
}

// -------- 表单：新建/编辑 --------
function posOpenCreate(){
  _posEditing = { code:'', name:'', level:'', parentId: _posSelected, region:'', status:'active' };
  posRenderForm('新建岗位');
}
function posOpenEdit(id){
  DMS.api('/api/sales-positions?page=1&size=1000').then(function(r){
    var pos = ((r.data && r.data.list) || []).find(function(x){return x.id===id;}) || {};
    _posEditing = {
      id: id,
      code: pos.code || '',
      name: pos.name || '',
      level: pos.level || '',
      parentId: pos.parentId || null,
      region: pos.region || '',
      status: pos.status || 'active'
    };
    posRenderForm('编辑岗位');
  });
}

function posRenderForm(title){
  var e = _posEditing;
  var isNew = !e.id;
  var panel = document.getElementById('posPanel');
  panel.innerHTML =
    '<div class="dms-card">' +
      '<div class="dms-card-title"><span>' + title + '</span>' +
        '<div class="actions">' +
          '<button class="dms-btn dms-btn-sm" onclick="posCancelForm()">✖ 取消</button>' +
          '<button class="dms-btn dms-btn-sm dms-btn-primary" onclick="posSubmitForm()">✅ 保存</button>' +
        '</div>' +
      '</div>' +
      '<div style="padding:8px 0;">' +
        _formRow('岗位编码', 'code', e.code, '如 POS-BJ-001', true, isNew) +
        _formRow('岗位名称', 'name', e.name, '如 华北大区经理', true) +
        _formSelect('层级', 'level', e.level, [
          {v:1,l:'L1 总监'},{v:2,l:'L2 大区经理'},{v:3,l:'L3 小区经理'},{v:4,l:'L4 销售代表'}
        ], true) +
        _formRow('大区', 'region', e.region, 'east/south/west/north 或省份', false) +
        _formSelect('状态', 'status', e.status, [
          {v:'active',l:'启用'},{v:'inactive',l:'停用'}
        ], true) +
        '<div style="margin-top:12px;padding:10px 12px;background:var(--md-surface-variant);border-radius:8px;font-size:12px;color:var(--md-on-surface-variant);">' +
        (isNew ? '💡 父岗位: ' + (e.parentId ? '#' + e.parentId : '（顶级）') : '💡 编辑模式：编码不可修改') +
        '</div>' +
      '</div>' +
    '</div>';
}

function _formRow(label, key, value, placeholder, required, editable){
  editable = editable !== false;
  return '<div style="display:grid;grid-template-columns:140px 1fr;gap:12px;align-items:center;padding:8px 0;">' +
    '<label style="color:var(--md-on-surface-variant);font-size:13px;">' +
      (required ? '<span style="color:var(--md-error);">*</span> ' : '') + label + '</label>' +
    '<input type="text" data-form-key="' + key + '" value="' + (value==null?'':String(value).replace(/"/g,'&quot;')) + '" ' +
      'placeholder="' + (placeholder||'') + '" ' + (editable?'':'readonly') + ' ' +
      'style="padding:8px 12px;border:1px solid var(--md-outline);border-radius:8px;font-size:14px;' + (editable?'':'background:#f5f5f5;') + '">' +
    '</div>';
}

function _formSelect(label, key, value, options, required){
  var opts = options.map(function(o){
    return '<option value="' + o.v + '"' + (String(o.v)===String(value)?' selected':'') + '>' + o.l + '</option>';
  }).join('');
  return '<div style="display:grid;grid-template-columns:140px 1fr;gap:12px;align-items:center;padding:8px 0;">' +
    '<label style="color:var(--md-on-surface-variant);font-size:13px;">' +
      (required ? '<span style="color:var(--md-error);">*</span> ' : '') + label + '</label>' +
    '<select data-form-key="' + key + '" style="padding:8px 12px;border:1px solid var(--md-outline);border-radius:8px;font-size:14px;background:white;">' +
      '<option value=""></option>' + opts +
    '</select>' +
    '</div>';
}

function posSubmitForm(){
  var body = { parentId: _posEditing.parentId };
  ['code','name','level','region','status'].forEach(function(k){
    var el = document.querySelector('[data-form-key="' + k + '"]');
    if (el) body[k] = el.value;
  });
  // 必填校验
  if (!body.code || !body.name || !body.level) {
    DMS.toast('请填写编码/名称/层级', 'warn');
    return;
  }
  body.level = Number(body.level);
  var isNew = !_posEditing.id;
  var url = isNew ? '/api/sales-positions' : '/api/sales-positions/' + _posEditing.id;
  var method = isNew ? 'POST' : 'PUT';
  DMS.api(url, {method: method, body: body}).then(function(r){
    if (r.code === 0) {
      DMS.toast(isNew ? '创建成功' : '保存成功', 'success');
      _posEditing = null;
      posLoadTree();
      if (r.data && r.data.id) setTimeout(function(){ posShowDetail(r.data.id); }, 200);
      else if (_posSelected) posShowDetail(_posSelected);
    } else {
      DMS.toast('保存失败：' + r.message, 'error');
    }
  });
}

function posCancelForm(){
  _posEditing = null;
  if (_posSelected) posShowDetail(_posSelected);
  else renderPositions();
}

// -------- 挂经销商/绑账号 --------
function posOpenBindUser(id){
  // v3.4.8：candidate-users 直接返回 role=sales 的用户 + 岗位占用信息
  DMS.api('/api/sales-positions/candidate-users').then(function(r){
    if (r.code !== 0) { DMS.toast('加载销售账号失败：' + r.message, 'error'); return; }
    var users = r.data || [];
    if (!users.length) {
      document.getElementById('posBindUserForm').innerHTML =
        '<div class="dms-empty" style="padding:20px;">⚠️ 系统内暂无 role=sales 的用户，请先在"用户管理"里创建销售账号</div>';
      return;
    }
    var options = '<option value="">-- 解绑 --</option>' + users.map(function(u){
      var boundToOther = u.boundPositionId && u.boundPositionId !== id;
      if (boundToOther) {
        return '<option value="' + u.id + '" disabled style="color:#999;">' +
          u.username + ' - ' + (u.name || '-') +
          ' (已在岗位: ' + (u.boundPositionName || '#' + u.boundPositionId) + ')</option>';
      }
      return '<option value="' + u.id + '">' + u.username + ' - ' + (u.name || '-') + '</option>';
    }).join('');
    var panel = document.getElementById('posBindUserForm');
    panel.innerHTML =
      '<div style="padding:10px 0;">' +
        '<div style="margin-bottom:6px;font-size:12px;color:var(--md-on-surface-variant);">选择销售账号绑定（灰色项已被其他岗位占用）：</div>' +
        '<select id="posBindSelect" style="width:100%;padding:6px 10px;border:1px solid var(--md-outline);border-radius:6px;font-size:13px;">' + options + '</select>' +
        '<div style="margin-top:8px;">' +
          '<button class="dms-btn dms-btn-sm dms-btn-primary" onclick="posSubmitBindUser(' + id + ')">✅ 保存绑定</button>' +
          '<button class="dms-btn dms-btn-sm" onclick="posShowDetail(' + id + ')">✖ 取消</button>' +
        '</div>' +
      '</div>';
  });
}
function posSubmitBindUser(id){
  var uid = document.getElementById('posBindSelect').value;
  DMS.api('/api/sales-positions/' + id + '/bind-user', {
    method: 'PUT',
    body: { userId: uid ? Number(uid) : null }
  }).then(function(r){
    if (r.code === 0) { DMS.toast('绑定已保存', 'success'); posLoadTree(); posShowDetail(id); }
    else DMS.toast('保存失败：' + r.message, 'error');
  });
}

function posOpenBindDealer(id){
  DMS.api('/api/dealers?page=1&size=1000').then(function(r){
    _allDealersCache = (r.data && r.data.list) || [];
    var dealers = _allDealersCache;
    // 加载所有岗位，用于反显 dealer 归属岗位名
    DMS.api('/api/sales-positions?page=1&size=1000').then(function(rp){
      var posList = (rp.data && rp.data.list) || [];
      var posMap = {};
      posList.forEach(function(p){ posMap[p.id] = p; });

      var checkboxHtml = dealers.map(function(d){
        var boundToOther = d.salesPositionId && d.salesPositionId !== id;
        var checked = d.salesPositionId === id ? 'checked' : '';
        var disabled = boundToOther ? 'disabled' : '';
        var style = boundToOther ? 'color:#999;background:#f5f5f5;cursor:not-allowed;' : '';
        var otherTag = boundToOther
          ? ' <span style="color:#c00;font-size:11px;margin-left:4px;">(已属岗位: ' + (posMap[d.salesPositionId] ? posMap[d.salesPositionId].name : '#' + d.salesPositionId) + ')</span>'
          : '';
        return '<label style="display:block;padding:6px 10px;border-bottom:1px solid var(--md-outline-variant);' + style + '">' +
          '<input type="checkbox" value="' + d.id + '" ' + checked + ' ' + disabled + ' style="margin-right:6px;"> ' +
          d.code + ' · ' + d.name + otherTag +
          '</label>';
      }).join('');
      var panel = document.getElementById('posBindDealerForm');
      panel.innerHTML =
        '<div style="padding:12px 0;">' +
          '<div style="margin-bottom:8px;font-size:13px;color:var(--md-on-surface-variant);">勾选要挂载的经销商（灰色项已被其他岗位占用，取消勾选=解挂）：</div>' +
          '<div id="posDealerListBox" style="max-height:400px;overflow-y:auto;border:1px solid var(--md-outline-variant);border-radius:6px;padding:4px;">' + checkboxHtml + '</div>' +
          '<div style="margin-top:10px;">' +
            '<button class="dms-btn dms-btn-sm dms-btn-primary" onclick="posSubmitBindDealer(' + id + ')">✅ 保存挂载</button>' +
            '<button class="dms-btn dms-btn-sm" onclick="posShowDetail(' + id + ')">✖ 取消</button>' +
          '</div>' +
        '</div>';
    });
  });
}
function posSubmitBindDealer(id){
  var boxes = document.querySelectorAll('#posDealerListBox input[type=checkbox]:not([disabled])');
  var checkedIds = [];
  boxes.forEach(function(b){ if (b.checked) checkedIds.push(Number(b.value)); });
  DMS.api('/api/sales-positions/' + id + '/bind-dealers', {
    method: 'PUT',
    body: { dealerIds: checkedIds }
  }).then(function(r){
    if (r.code === 0) {
      DMS.toast('已保存 ' + (r.data.boundCount != null ? r.data.boundCount : checkedIds.length) + ' 项', 'success');
      _allDealersCache = null;  // 清缓存
      posLoadTree();
      posShowDetail(id);
    } else {
      DMS.toast('保存失败：' + r.message, 'error');
    }
  });
}

// pos-tree-node hover 效果
var _posStyle = document.createElement('style');
_posStyle.textContent = '.pos-tree-node:hover{background:var(--md-surface-variant);}' +
  '.pos-tree-node.active{background:var(--md-primary-container);color:var(--md-on-primary-container);}';
document.head.appendChild(_posStyle);

// v3.4.15: 先加载后台菜单分组覆盖，再渲染首页与侧栏
loadMenuOverrides(function(){ goto('home'); });
</script>

worker_processes auto;
events { worker_connections 1024; }

http {
  include mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

  # 关键：把 /api/auth/ 重写掉 /api 前缀 → 转发到 /auth（因为后端 AuthController 只有 /auth）
  # 而其他 /api/* 保留 /api 前缀（因为业务 Controller 都是 /api/xxx）
  map $request_uri $rewritten {
    default $request_uri;
  }

  server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 30m;

    root /usr/share/nginx/html;
    index index.html;

    # 前端调 /api/auth/login → 转发到后端 /auth/login
    location /api/auth/ {
      rewrite ^/api/auth/(.*)$ /auth/$1 break;
      proxy_pass http://dms-backend:8080;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    # 其他 /api/* 保留前缀
    location /api/ {
      proxy_pass http://dms-backend:8080;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Authorization $http_authorization;
      proxy_read_timeout 300s;
    }

    # Swagger / actuator / auth（后端不带 /api 前缀）
    location /auth/ {
      proxy_pass http://dms-backend:8080;
      proxy_set_header Host $host;
    }
    location /actuator/ {
      proxy_pass http://dms-backend:8080;
      proxy_set_header Host $host;
    }
    location /swagger-ui/ {
      proxy_pass http://dms-backend:8080;
      proxy_set_header Host $host;
    }
    location = /swagger-ui.html {
      proxy_pass http://dms-backend:8080;
      proxy_set_header Host $host;
    }
    location /v3/api-docs {
      proxy_pass http://dms-backend:8080;
      proxy_set_header Host $host;
    }
    location /webjars/ {
      proxy_pass http://dms-backend:8080;
      proxy_set_header Host $host;
    }

    # 静态资源（前端）
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}

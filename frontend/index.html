<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMS 登录</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:"PingFang SC","Microsoft YaHei",sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#1E3A5F,#2C4B8E,#4568AE);
  display:flex; align-items:center; justify-content:center; padding:20px;
}
.login-container { display:flex; width:100%; max-width:960px; min-height:560px; background:#fff; border-radius:16px; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,.3); }
.login-brand { flex:1; background:linear-gradient(135deg,#2C4B8E,#1E3A5F); color:#fff; padding:60px 48px; display:flex; flex-direction:column; justify-content:center; }
.brand-logo { font-size:42px; font-weight:700; margin-bottom:16px; }
.brand-name { font-size:24px; margin-bottom:12px; }
.brand-desc { font-size:14px; opacity:.8; line-height:1.8; }
.brand-features { margin-top:40px; }
.brand-features li { list-style:none; padding:8px 0; font-size:14px; opacity:.9; display:flex; align-items:center; }
.brand-features li::before { content:'✓'; width:20px; height:20px; background:rgba(255,255,255,.2); border-radius:50%; text-align:center; line-height:20px; margin-right:12px; font-size:12px; }
.login-form { flex:1; padding:60px 48px; display:flex; flex-direction:column; justify-content:center; }
.form-title { font-size:28px; font-weight:700; color:#333; margin-bottom:8px; }
.form-subtitle { font-size:14px; color:#999; margin-bottom:24px; }
.tabs { display:flex; gap:16px; margin-bottom:24px; border-bottom:1px solid #eee; }
.tab { padding:10px 4px; font-size:14px; color:#999; cursor:pointer; border-bottom:2px solid transparent; }
.tab.active { color:#2C4B8E; border-bottom-color:#2C4B8E; font-weight:600; }
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:13px; color:#666; margin-bottom:6px; font-weight:500; }
.form-group input { width:100%; padding:12px 16px; border:1px solid #e0e0e0; border-radius:8px; font-size:14px; background:#fafafa; }
.form-group input:focus { outline:none; border-color:#2C4B8E; background:#fff; box-shadow:0 0 0 3px rgba(44,75,142,.1); }
.form-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; font-size:13px; }
.btn-login { width:100%; padding:14px; background:linear-gradient(135deg,#2C4B8E,#1E3A5F); color:#fff; border:none; border-radius:8px; font-size:15px; font-weight:500; cursor:pointer; letter-spacing:1px; }
.btn-login:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(44,75,142,.3); }
.btn-login:disabled { opacity:.6; }
.hint { background:#fff8e1; border:1px solid #ffe082; border-radius:6px; padding:10px 14px; font-size:12px; color:#f57c00; margin-bottom:16px; }
.hint strong { color:#d84315; }
.error { background:#ffebee; border:1px solid #ef9a9a; color:#c62828; padding:10px 14px; border-radius:6px; margin-bottom:16px; font-size:13px; display:none; }
.error.show { display:block; }
.footer { text-align:center; margin-top:24px; font-size:12px; color:#999; }
@media (max-width:768px) { .login-container { flex-direction:column; } .brand-features { display:none; } }
</style>
</head>
<body>
<div class="login-container">
  <div class="login-brand">
    <div class="brand-logo">DMS</div>
    <div class="brand-name">通用经销商管理系统</div>
    <div class="brand-desc">医疗器械 / 快消 / 零售<br>经销商全生命周期管理平台</div>
    <ul class="brand-features">
      <li>合同管理与电子签章</li>
      <li>订单/库存/销售一体化</li>
      <li>促销引擎与返利自动化</li>
      <li>多租户 SaaS 架构</li>
      <li>后台审计与操作日志</li>
    </ul>
  </div>
  <div class="login-form">
    <div class="form-title">欢迎回来</div>
    <div class="form-subtitle">选择您的登录入口</div>

    <div class="tabs">
      <div class="tab active" onclick="switchMode('biz')">业务工作台</div>
      <div class="tab" onclick="switchMode('admin')">后台管理</div>
    </div>

    <div class="hint">
      💡 演示：<strong>admin</strong> / <strong>Sh123456</strong> · 租户：<strong>default</strong>
    </div>
    <div class="error" id="errorMsg"></div>

    <form onsubmit="return doLogin(event)">
      <div class="form-group">
        <label>租户代码</label>
        <input type="text" id="tenantCode" value="default" required>
      </div>
      <div class="form-group">
        <label>账号</label>
        <input type="text" id="username" value="admin" required autofocus>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" value="Sh123456" required>
      </div>
      <div class="form-row">
        <label style="display:flex;align-items:center;color:#666;cursor:pointer;">
          <input type="checkbox" id="rememberMe" style="margin-right:6px;"> 记住我 7 天
        </label>
        <a href="javascript:alert('V1 由管理员后台重置密码');" style="color:#2C4B8E;text-decoration:none;">忘记密码?</a>
      </div>
      <button type="submit" class="btn-login" id="loginBtn">登 录</button>
    </form>
    <div class="footer">© 2026 DMS · V1.0.0-alpha</div>
  </div>
</div>
<script>
var mode = 'biz';
function switchMode(m){
  mode = m;
  document.querySelectorAll('.tab').forEach(function(t,i){
    t.classList.toggle('active', (i===0 && m==='biz') || (i===1 && m==='admin'));
  });
}
async function doLogin(e){
  e.preventDefault();
  var btn = document.getElementById('loginBtn');
  var err = document.getElementById('errorMsg');
  err.classList.remove('show');
  btn.disabled = true;
  btn.textContent = '登录中...';
  try {
    var r = await fetch('/api/auth/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        tenantCode: document.getElementById('tenantCode').value.trim(),
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
        rememberMe: document.getElementById('rememberMe').checked
      })
    });
    var d = await r.json();
    if (d.code === 0) {
      localStorage.setItem('dms_access_token', d.data.accessToken);
      localStorage.setItem('dms_refresh_token', d.data.refreshToken);
      localStorage.setItem('dms_user', JSON.stringify(d.data.user));
      window.location.href = (mode === 'admin') ? '/admin.html' : '/workspace.html';
    } else {
      err.textContent = '❌ ' + (d.message || '登录失败') + ' (' + d.code + ')';
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = '登 录';
    }
  } catch (ex) {
    err.textContent = '❌ 网络错误：' + ex.message;
    err.classList.add('show');
    btn.disabled = false;
    btn.textContent = '登 录';
  }
  return false;
}
if (localStorage.getItem('dms_access_token')) {
  fetch('/api/auth/me',{headers:{'Authorization':'Bearer '+localStorage.getItem('dms_access_token')}})
    .then(r=>r.json()).then(d=>{ if(d.code===0) window.location.href='/workspace.html'; }).catch(()=>{});
}
</script>
</body>
</html>

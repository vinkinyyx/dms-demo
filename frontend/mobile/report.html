<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>DMS 扫码报台</title><link rel="stylesheet" href="/mobile/mobile.css">
</head><body>
<header class="m-topbar">
  <div class="m-topbar-title">🛒 扫码报台</div>
  <div class="m-topbar-right" onclick="history.back()">←</div>
</header>
<div class="m-content">
  <div class="m-section">
    <div class="m-section-title">销售报台</div>
    <div class="m-input" style="text-align:center;font-size:60px;padding:30px;background:#fafafa;color:#2C4B8E;">📷</div>
    <div style="text-align:center;font-size:12px;color:#666;margin:10px 0;">扫描产品序列号，自动填充销售单</div>
    <div style="margin:10px 0;">
      <label style="font-size:12px;color:#666;">医院/终端</label>
      <input class="m-input" id="hospitalName" readonly placeholder="点击选择" onclick="pickHospital()">
    </div>
    <div style="margin:10px 0;">
      <label style="font-size:12px;color:#666;">销售序列号</label>
      <input class="m-input" id="serialInput" placeholder="扫码或输入">
    </div>
    <button class="m-btn m-btn-primary m-btn-block" onclick="doSubmit()">✅ 提交报台</button>
  </div>
  <div id="result"></div>
  <div class="m-section">
    <div class="m-section-title">📅 今日已报台</div>
    <div id="todayList"><div class="m-loading">加载中...</div></div>
  </div>
</div>
<nav class="m-tabbar">
  <a class="m-tabbar-item" href="/mobile/home.html"><span>🏠</span>首页</a>
  <a class="m-tabbar-item" href="/mobile/orders.html"><span>📋</span>订单</a>
  <a class="m-tabbar-item" href="/mobile/inventory.html"><span>📦</span>库存</a>
  <a class="m-tabbar-item" href="/mobile/messages.html"><span>🔔</span>消息</a>
  <a class="m-tabbar-item" href="javascript:localStorage.clear();location.href='/mobile/login.html'"><span>👤</span>我的</a>
</nav>
<script src="/mobile/mobile-lib.js"></script>
<script>
if (!MDMS.requireAuth()) throw 0;
var selectedHospitalId = null;

function pickHospital() {
  MDMS.api('/api/lookups/hospitals?limit=20').then(function(d){
    if (d.code!==0) return;
    var options = (d.data||[]).map(function(h){ return h.code + ' · ' + h.name; });
    var pick = prompt('选择医院（输入编号）：\n' + options.map(function(o,i){return (i+1)+'. '+o;}).join('\n'));
    var idx = parseInt(pick) - 1;
    if (idx >= 0 && idx < d.data.length) {
      selectedHospitalId = d.data[idx].id;
      document.getElementById('hospitalName').value = d.data[idx].label;
    }
  });
}

function doSubmit() {
  var sn = document.getElementById('serialInput').value.trim();
  if (!selectedHospitalId) { MDMS.toast('请选择医院', 'warn'); return; }
  if (!sn) { MDMS.toast('请输入序列号', 'warn'); return; }
  // V1 简化：仅记录到 result，不实际提交（实际提交需要走 sales-outs 完整流程）
  document.getElementById('result').innerHTML =
    '<div class="m-section" style="border:1px solid #52C41A;">' +
    '<div style="color:#52C41A;font-weight:600;">✅ 报台成功（Mock）</div>' +
    '<div style="font-size:12px;margin-top:6px;">医院 #' + selectedHospitalId + ' · 序列号 ' + sn + '</div>' +
    '<div style="font-size:11px;color:#999;margin-top:6px;">V1 演示：实际生产需在销售出库单中确认</div>' +
    '</div>';
  MDMS.toast('报台成功', 'success');
}

MDMS.api('/api/sales-outs?page=1&size=5').then(function(d){
  if (d.code!==0) { document.getElementById('todayList').innerHTML='<div class="m-error">'+d.message+'</div>'; return; }
  var list = (d.data && d.data.list) || [];
  if (!list.length) { document.getElementById('todayList').innerHTML='<div class="m-empty">📭 今日无</div>'; return; }
  var h = '';
  list.forEach(function(s){
    h += '<div style="padding:8px;border-bottom:1px solid #f0f0f0;">' +
      '<div style="font-weight:600;">'+s.code+'</div>' +
      '<div style="font-size:11px;color:#999;">销售日期 '+(s.salesDate||'-')+' · ¥ '+Number(s.amountInclTax||0).toFixed(2)+'</div>' +
      '</div>';
  });
  document.getElementById('todayList').innerHTML = h;
});
</script>
</body></html>
